<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>スクロール資料ジェネレーター Pro Max</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ac:#7c3aed;--acL:#f5f3ff;--acG:linear-gradient(135deg,#7c3aed,#a78bfa);
  --main:#0f172a;--sub:#475569;--bg:#f0f0f5;--card:#ffffff;
  --kpBd:#7c3aed;--kpBg:#f5f3ff;--qtBg:#f8fafc;
  --gS:#7c3aed;--gE:#a78bfa;
  --body:#334155;--R:20px;
  --sh:0 1px 3px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.06);
  --marker:#fff59d;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Noto Sans JP',sans-serif;background:var(--bg);color:var(--main);min-height:100vh;display:flex;flex-direction:column}
/* ── Header ── */
.hd{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hd h1{font-size:16px;font-weight:700;background:var(--acG);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd .sep{flex:1}
.hd .save-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;margin-right:4px}
.hd .save-label{font-size:11px;color:#64748b}
.hd .themes{display:flex;gap:6px;margin-left:12px}
.hd .td{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.2s}
.hd .td:hover,.hd .td.on{border-color:var(--main);transform:scale(1.15)}
.btn{padding:8px 18px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}
.btn-p{background:var(--acG);color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.25)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,58,237,.35)}
.btn-s{background:#f1f5f9;color:var(--main)}
.btn-s:hover{background:#e2e8f0}
.btn-d{background:#fef2f2;color:#dc2626}
.btn-d:hover{background:#fecaca}
/* ── Layout ── */
.wrap{display:flex;flex:1;overflow:hidden}
.pL{width:420px;min-width:420px;border-right:1px solid #e2e8f0;background:#fff;display:flex;flex-direction:column;overflow:hidden}
.pR{flex:1;overflow-y:auto;padding:40px;background:var(--bg)}
/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid #e2e8f0}
.tab{flex:1;padding:12px 0;text-align:center;font-size:13px;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab:hover{color:var(--main)}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.tabC{flex:1;overflow-y:auto;padding:16px}
/* ── Gallery ── */
.catBtn{display:inline-block;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;margin:0 4px 8px 0;border:1px solid #e2e8f0;background:#fff;color:#64748b;transition:.15s}
.catBtn:hover,.catBtn.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.tplGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.tplCard{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px;cursor:pointer;transition:.15s;position:relative}
.tplCard:hover{border-color:var(--ac);box-shadow:0 4px 16px rgba(124,58,237,.1)}
.tplCard h4{font-size:13px;margin-bottom:4px}
.tplCard p{font-size:11px;color:#94a3b8}
.tplCard .tplAdd{position:absolute;top:8px;right:8px;background:var(--acG);color:#fff;border:none;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;opacity:0;transition:.15s}
.tplCard:hover .tplAdd{opacity:1}
/* ── Editor Sections ── */
.secBlock{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;margin-bottom:12px;overflow:hidden}
.secHead{display:flex;align-items:center;padding:12px 14px;gap:8px;cursor:pointer}
.secHead .grip{cursor:grab;color:#94a3b8;font-size:14px;user-select:none}
.secHead .sn{font-size:13px;font-weight:700;flex:1}
.secHead .arrow{font-size:12px;color:#94a3b8;transition:.2s}
.secHead .arrow.open{transform:rotate(180deg)}
.secBody{padding:0 14px 14px}
.secBody.hide{display:none}
.fld{margin-bottom:10px}
.fld label{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px}
.fld input,.fld textarea,.fld select{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;transition:.15s}
.fld input:focus,.fld textarea:focus{border-color:var(--ac);outline:none;box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.fld textarea{resize:vertical;min-height:60px}
.alignBar{display:flex;gap:4px;margin-bottom:10px}
.alignBar button{flex:1;padding:6px;border:1px solid #e2e8f0;border-radius:8px;font-size:11px;background:#fff;cursor:pointer;transition:.15s;font-weight:600}
.alignBar button.on{background:var(--ac);color:#fff;border-color:var(--ac)}
/* ── Element Editor ── */
.elBlock{background:#fff;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:8px;padding:10px 12px;position:relative}
.elBlock.dragging{opacity:.4}
.elBlock .elGrip{cursor:grab;color:#cbd5e1;margin-right:6px;user-select:none}
.elBlock .elHead{display:flex;align-items:center;font-size:12px;font-weight:600;margin-bottom:6px}
.elBlock .elLabel{background:#f1f5f9;border:1px solid transparent;border-radius:4px;padding:1px 6px;font-size:11px;font-weight:600;color:var(--ac);cursor:text}
.elBlock .elLabel:focus{border-color:var(--ac);outline:none}
.elBlock .elRm{margin-left:auto;background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:14px}
.elBlock .elRm:hover{color:#ef4444}
.elAlignBar{display:flex;gap:3px;margin:6px 0}
.elAlignBar button{padding:3px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:10px;background:#fff;cursor:pointer;transition:.15s}
.elAlignBar button.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.addElBar{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.addElBar button{padding:4px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:11px;background:#fff;cursor:pointer;transition:.15s}
.addElBar button:hover{border-color:var(--ac);color:var(--ac)}
/* ── Marker highlight ── */
.marker-bar{display:flex;gap:4px;align-items:center;margin-top:4px}
.marker-bar .mClr{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s}
.marker-bar .mClr:hover,.marker-bar .mClr.on{border-color:var(--main);transform:scale(1.2)}
.marker-bar .mOff{padding:2px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:10px;cursor:pointer;background:#fff}
/* ── Color settings ── */
.colorGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.colorItem{display:flex;align-items:center;gap:8px}
.colorItem label{font-size:11px;font-weight:600;color:#64748b;min-width:70px}
.colorItem input[type=color]{width:36px;height:28px;border:1px solid #e2e8f0;border-radius:6px;padding:0;cursor:pointer}
.colorItem input[type=text]{width:80px;padding:4px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;font-family:monospace}
.presetGrid{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
.presetBtn{padding:6px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;transition:.15s}
.presetBtn:hover{border-color:var(--ac);color:var(--ac)}
.colorPv{margin-top:16px;border-radius:12px;overflow:hidden;border:1px solid #e2e8f0}
.colorPvCard{padding:24px;border-radius:12px;margin:16px}
/* ── Settings ── */
.settRow{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.settRow label{font-size:12px;font-weight:600;color:#64748b;min-width:80px}
.settRow input[type=number]{width:100px;padding:6px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px}
/* ── Preview Cards ── */
.pvCard{background:var(--card);border-radius:var(--R);box-shadow:var(--sh);overflow:hidden;position:relative}
.pvCard .acLine{height:4px;background:var(--acG)}
.pvCard .inner{padding:32px 36px}
.pvCard .lbl{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.06em;margin-bottom:12px}
.pvCard h2{font-size:22px;font-weight:900;line-height:1.4;margin-bottom:16px;letter-spacing:-.02em}
.pvCard .bodyTxt{font-size:15px;line-height:1.9;color:var(--body)}
.pvCard .bodyTxt mark{background:var(--marker);padding:2px 4px;border-radius:3px}
.pvCard .kp{border-left:4px solid var(--kpBd);background:var(--kpBg);padding:16px 20px;border-radius:0 12px 12px 0;margin:16px 0}
.pvCard .kp .kpLabel{font-size:11px;font-weight:700;color:var(--ac);margin-bottom:4px}
.pvCard .qt{background:var(--qtBg);border-radius:12px;padding:20px 24px;margin:16px 0;position:relative}
.pvCard .qt::before{content:'"';position:absolute;top:8px;left:12px;font-size:40px;color:var(--ac);opacity:.2}
.pvCard .numBlock{text-align:center;margin:16px 0}
.pvCard .numBlock .num{font-size:56px;font-weight:900;background:var(--acG);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pvCard .numBlock .numLabel{font-size:13px;color:#64748b;margin-top:4px}
.pvCard .warn{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:16px 20px;margin:16px 0}
.pvCard .warn .warnLabel{font-size:12px;font-weight:700;color:#dc2626;margin-bottom:4px}
.pvCard .cl-item{display:flex;align-items:flex-start;gap:8px;margin:8px 0;font-size:14px}
.pvCard .cl-item .ck{width:20px;height:20px;border-radius:50%;background:var(--acG);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px}
.pvCard .ba{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.pvCard .ba>div{padding:16px;border-radius:12px}
.pvCard .ba .bf{background:#fef2f2}
.pvCard .ba .af{background:#f0fdf4}
.pvCard .ba .baLabel{font-size:11px;font-weight:700;margin-bottom:6px}
.pvCard .bubble{display:flex;gap:12px;margin:12px 0;align-items:flex-start}
.pvCard .bubble .bIcon{width:36px;height:36px;border-radius:50%;background:var(--acL);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.pvCard .bubble .bBody{background:#f1f5f9;border-radius:0 14px 14px 14px;padding:12px 16px;font-size:14px;line-height:1.7;flex:1}
.pvCard .tl-item{display:flex;gap:14px;margin:12px 0;position:relative}
.pvCard .tl-item .tl-dot{width:12px;height:12px;border-radius:50%;background:var(--ac);flex-shrink:0;margin-top:4px;position:relative;z-index:1}
.pvCard .tl-item .tl-line{position:absolute;left:5px;top:16px;width:2px;height:calc(100% + 12px);background:#e2e8f0}
.pvCard .tl-item:last-child .tl-line{display:none}
.pvCard .pts3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:16px 0}
.pvCard .pts3>div{text-align:center;padding:16px;background:#f8fafc;border-radius:12px}
.pvCard .pts3 .ptIcon{font-size:28px;margin-bottom:8px}
.pvCard .pts3 .ptTtl{font-size:13px;font-weight:700}
.pvCard .ctaWrap{margin:20px 0}
.pvCard .ctaBtn{display:inline-block;padding:16px 40px;border-radius:60px;font-size:15px;font-weight:700;color:#fff;background:var(--acG);text-decoration:none;box-shadow:0 4px 20px rgba(124,58,237,.25);transition:.2s;cursor:pointer}
.pvCard .ctaBtn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(124,58,237,.35)}
.pvCard .dd{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.pvCard .dd>div{padding:16px;border-radius:12px}
.pvCard .dd .do{background:#f0fdf4;border:1px solid #bbf7d0}
.pvCard .dd .dont{background:#fef2f2;border:1px solid #fecaca}
.pvCard .dd .ddLabel{font-size:12px;font-weight:700;margin-bottom:6px}
.pvCard .qa-item{margin:12px 0}
.pvCard .qa-item .qa-q{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.pvCard .qa-item .qa-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0}
.pvCard .qa-item .qa-badge.q{background:var(--acG);color:#fff}
.pvCard .qa-item .qa-badge.a{background:#f0fdf4;color:#22c55e}
.pvCard .qa-item .qa-txt{font-size:14px;line-height:1.7;padding-top:4px}
.pvCard .merit{display:flex;align-items:flex-start;gap:10px;margin:10px 0}
.pvCard .merit .mIcon{font-size:20px;flex-shrink:0}
.pvCard .price-tbl{border:2px solid var(--ac);border-radius:14px;overflow:hidden;margin:16px 0}
.pvCard .price-tbl .pHead{background:var(--acG);color:#fff;padding:14px;text-align:center;font-weight:700}
.pvCard .price-tbl .pBody{padding:16px}
.pvCard .price-tbl .pRow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:14px}
.pvCard .price-tbl .pRow:last-child{border:none}
.pvCard .profile{display:flex;gap:20px;align-items:center;margin:16px 0}
.pvCard .profile img{width:80px;height:80px;border-radius:50%;object-fit:cover}
.pvCard .profile .prInfo{flex:1}
.pvCard .profile .prName{font-size:16px;font-weight:700}
.pvCard .profile .prBio{font-size:13px;color:#64748b;margin-top:4px;line-height:1.6}
.pvCard .stars{font-size:24px;margin:8px 0;letter-spacing:2px}
.pvCard .progress{margin:12px 0}
.pvCard .progress .prgLabel{font-size:12px;font-weight:600;margin-bottom:4px}
.pvCard .progress .prgBar{height:12px;background:#e2e8f0;border-radius:6px;overflow:hidden}
.pvCard .progress .prgFill{height:100%;background:var(--acG);border-radius:6px;transition:.5s}
.pvCard .ribbon{position:absolute;top:20px;right:-35px;background:var(--acG);color:#fff;padding:6px 40px;font-size:11px;font-weight:700;transform:rotate(45deg)}
.pvCard .divider{height:1px;background:#e2e8f0;margin:20px 0}
.pvCard .spacer{height:24px}
.pvCard .toc{margin:16px 0}
.pvCard .toc a{display:block;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:14px;color:var(--ac);text-decoration:none}
.pvCard .acc-item{border:1px solid #e2e8f0;border-radius:10px;margin:8px 0;overflow:hidden}
.pvCard .acc-item summary{padding:12px 16px;font-weight:600;font-size:14px;cursor:pointer}
.pvCard .acc-item .accBody{padding:0 16px 12px;font-size:14px;line-height:1.7}
.pvCard .img-block{margin:16px 0;text-align:center}
.pvCard .img-block img{max-width:100%;border-radius:12px}
.pvCard .img-block.circle img{width:120px;height:120px;border-radius:50%;object-fit:cover}
/* ── Modal ── */
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:20px;padding:28px;max-width:700px;width:95%;max-height:85vh;overflow-y:auto}
.modal h3{font-size:18px;margin-bottom:16px}
.modal textarea{width:100%;height:260px;font-size:12px;font-family:monospace;border:1px solid #e2e8f0;border-radius:10px;padding:12px}
.modal .mBtns{display:flex;gap:8px;margin-top:12px}
/* ── Drop Zone ── */
.drop-hint{border:2px dashed var(--ac);border-radius:10px;padding:12px;text-align:center;font-size:12px;color:var(--ac);background:var(--acL);margin-top:4px;transition:.2s}
.secBlock.drag-over{border-color:var(--ac);background:var(--acL)}
/* ── Responsive ── */
@media(max-width:900px){
  .wrap{flex-direction:column}
  .pL{width:100%;min-width:0;max-height:50vh}
  .pR{padding:20px}
}
</style>
</head>
<body>

<div class="hd">
  <h1>📄 スクロール資料ジェネレーター Pro Max</h1>
  <div class="sep"></div>
  <div class="save-dot" id="saveDot"></div>
  <span class="save-label" id="saveLabel">自動保存ON</span>
  <button class="btn btn-p" onclick="doExport()">📦 エクスポート</button>
</div>

<div class="wrap">
  <div class="pL">
    <div class="tabs">
      <div class="tab on" onclick="swTab(0)">📚 テンプレート</div>
      <div class="tab" onclick="swTab(1)">✏️ エディタ</div>
      <div class="tab" onclick="swTab(2)">🎨 カラー</div>
      <div class="tab" onclick="swTab(3)">⚙️ 設定</div>
    </div>
    <div class="tabC" id="tabC"></div>
  </div>
  <div class="pR" id="pvScroll"></div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <h3>📦 HTMLエクスポート</h3>
    <textarea id="exportArea" readonly></textarea>
    <div class="mBtns">
      <button class="btn btn-p" onclick="navigator.clipboard.writeText(document.getElementById('exportArea').value);this.textContent='✅ コピー済み!'">📋 コピー</button>
      <button class="btn btn-s" onclick="dlFile()">💾 ダウンロード</button>
      <button class="btn btn-s" onclick="document.getElementById('modalBg').classList.remove('show')">閉じる</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   DATA & STATE
   ═══════════════════════════════════════════════ */
const SAVE_KEY = 'scrollDocPro_v4';

// Color definitions
const DEFAULT_COLORS = {
  ac:'#7c3aed', acL:'#f5f3ff', gS:'#7c3aed', gE:'#a78bfa',
  main:'#0f172a', body:'#334155', sub:'#64748b',
  card:'#ffffff', bg:'#f0f0f5',
  kpBd:'#7c3aed', kpBg:'#f5f3ff', qtBg:'#f8fafc',
  marker:'#fff59d'
};

const COLOR_LABELS = {
  ac:'アクセント', acL:'アクセント薄', gS:'グラデ開始', gE:'グラデ終了',
  main:'見出し文字', body:'本文文字', sub:'補足文字',
  card:'カード背景', bg:'ページ背景',
  kpBd:'KPボーダー', kpBg:'KP背景', qtBg:'引用背景',
  marker:'マーカー色'
};

const PRESETS = [
  {nm:'ビジネス',ac:'#2563eb',acL:'#eff6ff',gS:'#2563eb',gE:'#3b82f6',main:'#0f172a',body:'#334155',sub:'#64748b',card:'#fff',bg:'#f0f4f8',kpBd:'#2563eb',kpBg:'#eff6ff',qtBg:'#f8fafc',marker:'#bfdbfe'},
  {nm:'恋愛',ac:'#e84393',acL:'#fdf2f8',gS:'#e84393',gE:'#fd79a8',main:'#4a1942',body:'#6b4560',sub:'#a87ca0',card:'#fff',bg:'#fef6fa',kpBd:'#e84393',kpBg:'#fdf2f8',qtBg:'#fef6fa',marker:'#fbcfe8'},
  {nm:'占い',ac:'#8b5cf6',acL:'#f5f3ff',gS:'#6d28d9',gE:'#a78bfa',main:'#1e1b4b',body:'#3b3570',sub:'#7c72a8',card:'#fff',bg:'#f3f0ff',kpBd:'#7c3aed',kpBg:'#f5f3ff',qtBg:'#f3f0ff',marker:'#ddd6fe'},
  {nm:'自己啓発',ac:'#f59e0b',acL:'#fffbeb',gS:'#f59e0b',gE:'#fbbf24',main:'#451a03',body:'#78350f',sub:'#a16207',card:'#fff',bg:'#fefce8',kpBd:'#f59e0b',kpBg:'#fffbeb',qtBg:'#fefce8',marker:'#fde68a'},
  {nm:'健康',ac:'#10b981',acL:'#ecfdf5',gS:'#059669',gE:'#34d399',main:'#064e3b',body:'#065f46',sub:'#6ee7b7',card:'#fff',bg:'#f0fdf4',kpBd:'#10b981',kpBg:'#ecfdf5',qtBg:'#f0fdf4',marker:'#a7f3d0'},

function autoSave(){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({secs,uid,colors,G}));
    const d = document.getElementById('saveDot');
    if(d){d.style.background='#22c55e';setTimeout(()=>d.style.background='#22c55e',500)}
  }catch(e){}
}
function autoLoad(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    if(d.secs) secs = d.secs;
    if(d.uid) uid = d.uid;
    if(d.colors) colors = {...DEFAULT_COLORS,...d.colors};
    if(d.G){Object.assign(G,d.G)}
  }catch(e){}
}
setInterval(autoSave, 2000);

/* ═══════════════════════════════════════════════
   UTILITY
   ═══════════════════════════════════════════════ */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function nl2br(s){return esc(s).replace(/\n/g,'<br>')}
function applyMarker(text, markerColor){
  if(!text) return '';
  // 『…』 pattern for marker highlighting
  return nl2br(text).replace(/『([^』]+)』/g, (m, p1) => {
    const mc = markerColor || colors.marker;
    if(mc === 'transparent') return `<strong>${p1}</strong>`;
    return `<mark style="background:${mc};padding:2px 6px;border-radius:3px">${p1}</mark>`;
  });
}
function deepClone(o){return JSON.parse(JSON.stringify(o))}
function nid(){return ++uid}

// Apply colors to CSS variables
function applyColors(){
  const r = document.documentElement.style;
  r.setProperty('--ac', colors.ac);
  r.setProperty('--acL', colors.acL);
  r.setProperty('--gS', colors.gS);
  r.setProperty('--gE', colors.gE);
  r.setProperty('--acG', `linear-gradient(135deg,${colors.gS},${colors.gE})`);
  r.setProperty('--main', colors.main);
  r.setProperty('--body', colors.body);
  r.setProperty('--sub', colors.sub);
  r.setProperty('--card', colors.card);
  r.setProperty('--bg', colors.bg);
  r.setProperty('--kpBd', colors.kpBd);
  r.setProperty('--kpBg', colors.kpBg);
  r.setProperty('--qtBg', colors.qtBg);
  r.setProperty('--marker', colors.marker);
}

/* ═══════════════════════════════════════════════
   IMAGE HANDLING
   ═══════════════════════════════════════════════ */
function handleImg(file, cb){
  const MAX = 500*1024;
  const reader = new FileReader();
  reader.onload = function(e){
    if(file.size <= MAX){cb(e.target.result);return}
    // Compress
    const img = new Image();
    img.onload = function(){
      const c = document.createElement('canvas');
      let w = img.width, h = img.height;
      if(w > 1200){h = h*(1200/w);w=1200}
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.7));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

    iconImg: '',
    label: tpl ? ('SECTION ' + secs.length) : 'SECTION ' + secs.length,
    heading: tpl ? tpl.nm : '新しいセクション',
    align: 'center',
    collapsed: false,
    els: tpl ? deepClone(tpl.els).map(e => ({...e, id:nid(), align:'inherit', label:e.label||ELK[e.t]?.nm||e.t})) : [{id:nid(),t:'body',v:'テキストを入力してください',mk:'',align:'inherit',label:'📝 本文'}]
  };
  secs.push(s);
  swTab(1);
  renderAll();
}
function rmSec(id){secs=secs.filter(s=>s.id!==id);renderAll()}
function mvSec(id,dir){
  const i=secs.findIndex(s=>s.id===id);
  const ni=i+dir;
  if(ni<0||ni>=secs.length)return;
  [secs[i],secs[ni]]=[secs[ni],secs[i]];
  renderAll();
}

function rmEl(secId, elId){

}

/* ═══════════════════════════════════════════════
   DRAG & DROP (Elements within section)
   ═══════════════════════════════════════════════ */
let dragElId=null, dragSecId=null;
function elDragStart(secId, elId, e){
  dragSecId=secId; dragElId=elId;
  e.dataTransfer.effectAllowed='move';
  e.target.closest('.elBlock').classList.add('dragging');
}
function elDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move'}
function elDrop(secId, elId, e){
  e.preventDefault();
  if(dragSecId!==secId) return;
  const s=secs.find(x=>x.id===secId);
  if(!s) return;
  const from=s.els.findIndex(x=>x.id===dragElId);
  const to=s.els.findIndex(x=>x.id===elId);
  if(from<0||to<0||from===to) return;
  const [item]=s.els.splice(from,1);
  s.els.splice(to,0,item);
  renderAll();
}
function elDragEnd(e){
  document.querySelectorAll('.elBlock.dragging').forEach(x=>x.classList.remove('dragging'));
  dragElId=null;dragSecId=null;
}

/* ═══════════════════════════════════════════════
   SECTION DRAG & DROP
   ═══════════════════════════════════════════════ */
let dragSId=null;
function secDragStart(id,e){dragSId=id;e.dataTransfer.effectAllowed='move';e.target.closest('.secBlock').style.opacity='.4'}
function secDragEnd(e){e.target.closest('.secBlock').style.opacity='1';dragSId=null}
function secDragOver(e){e.preventDefault()}
function secDrop(id,e){
  e.preventDefault();
  if(dragSId===null||dragSId===id)return;
  const from=secs.findIndex(x=>x.id===dragSId);
  const to=secs.findIndex(x=>x.id===id);
  if(from<0||to<0)return;
  const [item]=secs.splice(from,1);
  secs.splice(to,0,item);
  renderAll();
}

/* ═══════════════════════════════════════════════
   TAB SYSTEM
   ═══════════════════════════════════════════════ */
function swTab(n){
  aTab=n;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===n));
  renderTab();
}
function renderTab(){
  const c=document.getElementById('tabC');
  switch(aTab){
    case 0: renderGallery(c);break;
    case 1: renderEditor(c);break;
    case 2: renderColors(c);break;
    case 3: renderSettings(c);break;
  }
}

      fields = `<input value="${esc(el.prgLabel||'')}" oninput="uel(${secId},${el.id},'prgLabel',this.value)" placeholder="ラベル"><input type="range" min="0" max="100" value="${el.v||50}" oninput="uel(${secId},${el.id},'v',parseInt(this.value));renderAll()" style="margin-top:4px"><span style="font-size:12px">${el.v||50}%</span>`;
      break;
    case 'ribbon':
      fields = `<input value="${esc(el.v)}" oninput="uel(${secId},${el.id},'v',this.value)" placeholder="リボンテキスト">`;
      break;
    case 'toc':
      fields = (el.items||[]).map((it,i)=>`<div style="display:flex;gap:4px;margin:2px 0"><span style="font-size:12px;color:#94a3b8;min-width:20px">${i+1}.</span><input value="${esc(it)}" oninput="uelArr(${secId},${el.id},'items',${i},this.value)" style="flex:1" placeholder="項目"><button onclick="uelArrRm(${secId},${el.id},'items',${i})" style="border:none;background:none;color:#dc2626;cursor:pointer">✕</button></div>`).join('') + `<button class="btn btn-s" style="font-size:11px;margin-top:4px" onclick="uelArrAdd(${secId},${el.id},'items','')">＋ 追加</button>`;
      break;
    case 'accordion':
      fields = (el.items||[]).map((it,i)=>`<div style="border:1px solid #e2e8f0;border-radius:8px;padding:6px;margin:4px 0"><input value="${esc(it.t)}" oninput="uelArrObj(${secId},${el.id},'items',${i},'t',this.value)" placeholder="タイトル" style="font-weight:700;margin-bottom:4px"><textarea oninput="uelArrObj(${secId},${el.id},'items',${i},'v',this.value)" placeholder="内容">${esc(it.v)}</textarea><button onclick="uelArrRm(${secId},${el.id},'items',${i})" style="border:none;background:none;color:#dc2626;cursor:pointer;font-size:11px">✕</button></div>`).join('') + `<button class="btn btn-s" style="font-size:11px;margin-top:4px" onclick="uelArrAdd(${secId},${el.id},'items',{t:'',v:''})">＋ 追加</button>`;
      break;
    case 'table':
      fields = `<div style="font-size:10px;color:#94a3b8;margin-bottom:4px">ヘッダー行</div><div style="display:flex;gap:4px;margin-bottom:6px">${(el.headers||[]).map((h,i)=>`<input value="${esc(h)}" oninput="uelArr(${secId},${el.id},'headers',${i},this.value)" style="flex:1" placeholder="列${i+1}">`).join('')}<button onclick="uelArrAdd(${secId},${el.id},'headers','列');(secs.find(x=>x.id===${secId}).els.find(e=>e.id===${el.id}).rows||[]).forEach(r=>r.push(''));renderAll()" style="border:none;background:var(--acL);color:var(--ac);cursor:pointer;border-radius:6px;padding:2px 8px;font-size:11px">＋列</button></div>
      <div style="font-size:10px;color:#94a3b8;margin-bottom:4px">データ行</div>${(el.rows||[]).map((row,ri)=>`<div style="display:flex;gap:4px;margin:2px 0">${row.map((cell,ci)=>`<input value="${esc(cell)}" oninput="uelTblCell(${secId},${el.id},${ri},${ci},this.value)" style="flex:1">`).join('')}<button onclick="uelArrRm(${secId},${el.id},'rows',${ri})" style="border:none;background:none;color:#dc2626;cursor:pointer;font-size:11px">✕</button></div>`).join('')}
      <button class="btn btn-s" style="font-size:11px;margin-top:4px" onclick="uelTblAddRow(${secId},${el.id})">＋ 行追加</button>`;
      break;
    case 'flow':
      fields = (el.items||[]).map((it,i)=>`<div style="display:flex;gap:4px;margin:2px 0;align-items:center">${i>0?'<span style="color:var(--ac)">→</span>':''}<input value="${esc(it)}" oninput="uelArr(${secId},${el.id},'items',${i},this.value)" style="flex:1"><button onclick="uelArrRm(${secId},${el.id},'items',${i})" style="border:none;background:none;color:#dc2626;cursor:pointer">✕</button></div>`).join('') + `<button class="btn btn-s" style="font-size:11px;margin-top:4px" onclick="uelArrAdd(${secId},${el.id},'items','')">＋ 追加</button>`;
      break;
    case 'divider': fields='<span style="font-size:11px;color:#94a3b8">区切り線（設定不要）</span>';break;
    case 'spacer': fields='<span style="font-size:11px;color:#94a3b8">余白（設定不要）</span>';break;
  }

  return `<div class="elBlock" draggable="true" ondragstart="elDragStart(${secId},${el.id},event)" ondragover="elDragOver(event)" ondrop="elDrop(${secId},${el.id},event)" ondragend="elDragEnd(event)">
    <div class="elHead">
      <span class="elGrip">⠿</span>
      <span class="elLabel" contenteditable="true" onblur="uel(${secId},${el.id},'label',this.textContent);renderPv()">${esc(el.label||ELK[el.t]?.nm||el.t)}</span>
      <button class="elRm" onclick="rmEl(${secId},${el.id})">✕</button>
    </div>
    ${alignBtns}
    ${fields}
  </div>`;
}

/* ═══════════════════════════════════════════════
   ELEMENT UPDATE HELPERS
   ═══════════════════════════════════════════════ */
function uel(secId,elId,key,val){
  const s=secs.find(x=>x.id===secId);
  if(!s)return;
  const e=s.els.find(x=>x.id===elId);
  if(e){e[key]=val;renderPv()}
}
function uelArr(secId,elId,key,idx,val){
  const s=secs.find(x=>x.id===secId);if(!s)return;
  const e=s.els.find(x=>x.id===elId);if(!e)return;
  if(!e[key])e[key]=[];
  e[key][idx]=val;renderPv();
}
function uelArrIdx(secId,elId,key,idx,val){uelArr(secId,elId,key,idx,val)}
function uelArrObj(secId,elId,key,idx,prop,val){
  const s=secs.find(x=>x.id===secId);if(!s)return;
  const e=s.els.find(x=>x.id===elId);if(!e)return;
  if(!e[key])e[key]=[];
  if(!e[key][idx])e[key][idx]={};
  e[key][idx][prop]=val;renderPv();
}
function uelArrRm(secId,elId,key,idx){
  const s=secs.find(x=>x.id===secId);if(!s)return;
  const e=s.els.find(x=>x.id===elId);if(!e||!e[key])return;
  e[key].splice(idx,1);renderAll();
}
function uelArrAdd(secId,elId,key,val){
  const s=secs.find(x=>x.id===secId);if(!s)return;
  const e=s.els.find(x=>x.id===elId);if(!e)return;
  if(!e[key])e[key]=[];
  e[key].push(typeof val==='object'?deepClone(val):val);renderAll();
}
function uelTblCell(secId,elId,ri,ci,val){
  const s=secs.find(x=>x.id===secId);if(!s)return;
  const e=s.els.find(x=>x.id===elId);if(!e||!e.rows)return;
  e.rows[ri][ci]=val;renderPv();
}
function uelTblAddRow(secId,elId){
  const s=secs.find(x=>x.id===secId);if(!s)return;
  const e=s.els.find(x=>x.id===elId);if(!e)return;
  const cols=(e.headers||[]).length||2;
  if(!e.rows)e.rows=[];
  e.rows.push(Array(cols).fill(''));renderAll();
}

      <div style="background:${colors.card};border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden">
        <div style="height:4px;background:linear-gradient(135deg,${colors.gS},${colors.gE})"></div>
        <div style="padding:24px">
          <span style="display:inline-block;padding:4px 12px;border-radius:16px;font-size:11px;font-weight:700;background:${colors.acL};color:${colors.ac}">PREVIEW</span>
          <h3 style="color:${colors.main};margin:8px 0;font-size:18px">プレビュー見出し</h3>
          <p style="color:${colors.body};font-size:14px;line-height:1.8">本文テキストのプレビューです。『マーカーハイライト』はこのように表示されます。</p>
          <div style="border-left:4px solid ${colors.kpBd};background:${colors.kpBg};padding:12px 16px;border-radius:0 8px 8px 0;margin-top:12px">
            <span style="font-size:11px;font-weight:700;color:${colors.ac}">KEY POINT</span>
            <p style="font-size:13px;color:${colors.body};margin-top:4px">キーポイントの表示例</p>

function applyPreset(i){
  const p = PRESETS[i];
  Object.keys(p).forEach(k=>{if(k!=='nm')colors[k]=p[k]});
  applyColors();renderAll();
}
function resetColors(){
  Object.assign(colors, DEFAULT_COLORS);
  applyColors();renderAll();
}

   SETTINGS TAB
   ═══════════════════════════════════════════════ */
function renderSettings(c){
  let h = '<div style="font-size:14px;font-weight:700;margin-bottom:16px">⚙️ レイアウト設定</div>';
  h += `<div class="settRow"><label>カード最大幅</label><input type="number" value="${G.maxW}" min="320" max="2000" step="10" oninput="G.maxW=parseInt(this.value)||700;renderPv()"> px</div>`;
  h += `<div class="settRow"><label>カード間余白</label><input type="number" value="${G.gap}" min="0" max="200" step="4" oninput="G.gap=parseInt(this.value)||40;renderPv()"> px</div>`;
  h += `<div class="settRow"><label>角丸</label><input type="number" value="${G.radius}" min="0" max="60" step="2" oninput="G.radius=parseInt(this.value)||0;renderPv()"> px</div>`;
  h += '<hr style="margin:20px 0;border:none;border-top:1px solid #e2e8f0">';
  h += '<div style="font-size:14px;font-weight:700;margin-bottom:12px">💾 データ管理</div>';
  h += `<div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-s" onclick="exportJSON()">📥 JSON保存</button>
    <label class="btn btn-s" style="cursor:pointer">📤 JSON読込<input type="file" accept=".json" hidden onchange="importJSON(this.files[0])"></label>
  </div>`;
  h += '<hr style="margin:20px 0;border:none;border-top:1px solid #e2e8f0">';
  h += '<div style="font-size:14px;font-weight:700;margin-bottom:12px;color:#dc2626">🗑️ レイアウトリセット</div>';

  h += `<button class="btn btn-d" style="width:100%" onclick="resetAll()">🗑️ 全てリセットする</button>`;

}

/* ═══════════════════════════════════════════════
   RESET ALL (Layout Reset)
   ═══════════════════════════════════════════════ */
function resetAll(){
  if(!confirm('⚠️ すべてのセクション・カラー設定・レイアウト設定を初期状態に戻します。\nこの操作は元に戻せません。\n\nリセットしますか？')) return;
  secs = [];
  uid = 0;
  Object.assign(colors, DEFAULT_COLORS);
  G.maxW = 700;
  G.gap = 40;
  G.radius = 20;
  localStorage.removeItem(SAVE_KEY);
  applyColors();
  renderAll();
  alert('✅ リセット完了しました');
}

/* ═══════════════════════════════════════════════
   JSON EXPORT / IMPORT
   ═══════════════════════════════════════════════ */
function exportJSON(){
  const data = JSON.stringify({secs,uid,colors,G}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'scroll-data.json';
  a.click();
}
function importJSON(file){
  if(!file)return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const d = JSON.parse(e.target.result);
      if(d.secs) secs = d.secs;
      if(d.uid) uid = d.uid;
      if(d.colors) Object.assign(colors, d.colors);
      if(d.G) Object.assign(G, d.G);
      applyColors();renderAll();
      alert('✅ データを読み込みました');
    }catch(err){alert('❌ JSONの読み込みに失敗しました')}
  };
  reader.readAsText(file);
}

/* ═══════════════════════════════════════════════
   PREVIEW RENDERING
   ═══════════════════════════════════════════════ */
function renderPv(){
  const pv = document.getElementById('pvScroll');
  if(!secs.length){
    pv.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#94a3b8;text-align:center"><div><p style="font-size:48px;margin-bottom:16px">📄</p><p style="font-size:16px">左パネルのテンプレートからセクションを追加してください</p></div></div>';
    return;
  }
  let h = '';
  secs.forEach(s => {
    h += renderCard(s);
  });
  pv.innerHTML = `<div style="max-width:${G.maxW}px;margin:0 auto;display:flex;flex-direction:column;gap:${G.gap}px">${h}</div>`;
}

function getAlign(el, sec){
  return el.align && el.align !== 'inherit' ? el.align : sec.align || 'center';
}
function alignStyle(align){
  return `text-align:${align}`;
}

function renderCard(s){
  const hasRibbon = s.els.some(e=>e.t==='ribbon');
  let h = `<div class="pvCard" style="border-radius:${G.radius}px;${hasRibbon?'overflow:hidden':''}">`;
  h += `<div class="acLine" style="background:linear-gradient(135deg,${colors.gS},${colors.gE})"></div>`;
  h += '<div class="inner">';

  // Ribbon
  s.els.filter(e=>e.t==='ribbon').forEach(el=>{
    h += `<div class="ribbon" style="background:linear-gradient(135deg,${colors.gS},${colors.gE})">${esc(el.v)}</div>`;
  });

  // Icon + Label + Heading
  if(s.label || s.heading){
    const ha = s.align || 'center';
    h += `<div style="${alignStyle(ha)}">`;
    if(s.iconImg){
      h += `<img src="${s.iconImg}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;margin-bottom:8px;display:block;${ha==='center'?'margin-left:auto;margin-right:auto':ha==='right'?'margin-left:auto':''}">`;
    } else if(s.icon){
      h += `<span style="font-size:28px;display:block;margin-bottom:8px">${esc(s.icon)}</span>`;
    }
    if(s.label){
      h += `<span class="lbl" style="background:${colors.acL};color:${colors.ac}">${esc(s.label)}</span>`;
    }
    if(s.heading){
      h += `<h2 style="color:${colors.main}">${esc(s.heading)}</h2>`;
    }
    h += '</div>';
  }

  // Elements
  s.els.forEach(el=>{
    if(el.t==='ribbon') return; // already rendered
    const a = getAlign(el, s);
    const as = alignStyle(a);
    const mkColor = el.mk || colors.marker;
    switch(el.t){
      case 'body':
        h += `<div class="bodyTxt" style="${as};color:${colors.body}">${applyMarker(el.v, mkColor)}</div>`;
        break;
      case 'subtitle':
        h += `<h3 style="${as};color:${colors.main};font-size:17px;font-weight:700;margin:20px 0 8px">${esc(el.v)}</h3>`;
        break;
      case 'image':
        if(el.v) h += `<div class="img-block" style="${as}"><img src="${el.v}" alt="${esc(el.cap||'')}"><div style="font-size:12px;color:${colors.sub};margin-top:6px">${esc(el.cap||'')}</div></div>`;
        break;
      case 'image_circle':
        if(el.v) h += `<div class="img-block circle" style="${as}"><img src="${el.v}" alt="${esc(el.cap||'')}"><div style="font-size:12px;color:${colors.sub};margin-top:6px">${esc(el.cap||'')}</div></div>`;
        break;
      case 'keypoint':
        h += `<div class="kp" style="border-left-color:${colors.kpBd};background:${colors.kpBg}"><div class="kpLabel" style="color:${colors.ac}">${esc(el.label||'KEY POINT')}</div><div style="font-size:14px;line-height:1.8;color:${colors.body}">${nl2br(el.v)}</div></div>`;
        break;
      case 'quote':
        h += `<div class="qt" style="background:${colors.qtBg};${as}"><div style="font-size:14px;line-height:1.8;color:${colors.body};font-style:italic;padding-left:20px">${nl2br(el.v)}</div>${el.label?`<div style="font-size:12px;color:${colors.sub};margin-top:8px;text-align:right">— ${esc(el.label)}</div>`:''}</div>`;
        break;
      case 'number':
        h += `<div class="numBlock" style="${as}"><div class="num" style="background:linear-gradient(135deg,${colors.gS},${colors.gE});-webkit-background-clip:text;-webkit-text-fill-color:transparent">${esc(el.num)}${el.unit?`<span style="font-size:28px">${esc(el.unit)}</span>`:''}</div><div class="numLabel" style="color:${colors.sub}">${esc(el.numLabel||el.label||'')}</div></div>`;
        break;
      case 'warn':
        h += `<div class="warn"><div class="warnLabel">${esc(el.label||'⚠️ 注意')}</div><div style="font-size:14px;color:#991b1b">${nl2br(el.v)}</div></div>`;
        break;
      case 'checklist':
        h += `<div style="${as}">`;
        if(el.label) h += `<div style="font-size:13px;font-weight:700;color:${colors.main};margin-bottom:8px">${esc(el.label)}</div>`;
        (el.items||[]).forEach(it=>{
          h += `<div class="cl-item" style="${a==='center'?'justify-content:center':a==='right'?'justify-content:flex-end':''}"><span class="ck" style="background:linear-gradient(135deg,${colors.gS},${colors.gE})">✓</span><span style="color:${colors.body}">${esc(it)}</span></div>`;
        });
        h += '</div>';
        break;
      case 'ba':
        h += `<div class="ba"><div class="bf"><div class="baLabel" style="color:#dc2626">${esc(el.labelB||'BEFORE')}</div><div style="font-size:14px;color:#991b1b">${nl2br(el.before)}</div></div><div class="af"><div class="baLabel" style="color:#22c55e">${esc(el.labelA||'AFTER')}</div><div style="font-size:14px;color:#166534">${nl2br(el.after)}</div></div></div>`;
        break;
      case 'bubble':
        h += `<div class="bubble"><div class="bIcon" style="background:${colors.acL}">${esc(el.icon)}</div><div><div class="bBody">${nl2br(el.v)}</div>${el.name?`<div style="font-size:11px;color:${colors.sub};margin-top:4px">${esc(el.name)}</div>`:''}</div></div>`;
        break;
      case 'timeline':
        h += '<div>';
        (el.items||[]).forEach((it,i)=>{
          h += `<div class="tl-item"><div class="tl-dot" style="background:${colors.ac}"></div>${i<(el.items.length-1)?`<div class="tl-line"></div>`:''}<div style="flex:1"><div style="font-size:12px;font-weight:700;color:${colors.ac}">${esc(it.t)}</div><div style="font-size:14px;color:${colors.body};margin-top:2px">${nl2br(it.v)}</div></div></div>`;
        });
        h += '</div>';
        break;
      case 'pts3':
        h += `<div class="pts3" style="${(el.items||[]).length<=2?'grid-template-columns:repeat('+(el.items||[]).length+',1fr)':''}">`;
        (el.items||[]).forEach(it=>{
          h += `<div><div class="ptIcon">${esc(it.icon)}</div><div class="ptTtl" style="color:${colors.main}">${esc(it.title)}</div><div style="font-size:12px;color:${colors.body};margin-top:4px">${esc(it.v)}</div></div>`;
        });
        h += '</div>';
        break;
      case 'cta':
        h += `<div class="ctaWrap" style="${as}"><a href="${esc(el.url||'#')}" class="ctaBtn" style="background:linear-gradient(135deg,${colors.gS},${colors.gE})" target="_blank" rel="noopener">${esc(el.v)}</a></div>`;
        break;
      case 'do_dont':
        h += `<div class="dd"><div class="do"><div class="ddLabel" style="color:#22c55e">✅ ${esc(el.labelD||'Do')}</div>${(el.doList||[]).map(it=>'<div style="font-size:14px;color:#166534;margin:4px 0">・'+esc(it)+'</div>').join('')}</div><div class="dont"><div class="ddLabel" style="color:#dc2626">❌ ${esc(el.labelDn||"Don't")}</div>${(el.dontList||[]).map(it=>'<div style="font-size:14px;color:#991b1b;margin:4px 0">・'+esc(it)+'</div>').join('')}</div></div>`;
        break;
      case 'qa':
        (el.items||[]).forEach(it=>{
          h += `<div class="qa-item"><div class="qa-q"><span class="qa-badge q" style="background:linear-gradient(135deg,${colors.gS},${colors.gE})">Q</span><div class="qa-txt" style="color:${colors.main};font-weight:600">${esc(it.q)}</div></div><div class="qa-q" style="margin-left:38px"><span class="qa-badge a">A</span><div class="qa-txt" style="color:${colors.body}">${nl2br(it.a)}</div></div></div>`;
        });
        break;
      case 'merit':
        (el.items||[]).forEach(it=>{
          h += `<div class="merit" style="${a==='center'?'justify-content:center':a==='right'?'justify-content:flex-end':''}"><span class="mIcon">${esc(it.icon)}</span><span style="font-size:14px;color:${colors.body}">${esc(it.v)}</span></div>`;
        });
        break;
      case 'price':
        h += `<div class="price-tbl"><div class="pHead" style="background:linear-gradient(135deg,${colors.gS},${colors.gE})">${esc(el.label||'料金表')}</div><div class="pBody">${(el.items||[]).map(it=>`<div class="pRow"><span style="color:${colors.body}">${esc(it.k)}</span><span style="font-weight:700;color:${colors.main}">${esc(it.v)}</span></div>`).join('')}</div></div>`;
        break;
      case 'profile':
        h += `<div class="profile" style="${a==='center'?'justify-content:center':a==='right'?'justify-content:flex-end':''}">${el.img?`<img src="${el.img}">`:`<div style="width:80px;height:80px;border-radius:50%;background:${colors.acL};display:flex;align-items:center;justify-content:center;font-size:32px">👤</div>`}<div class="prInfo"><div class="prName" style="color:${colors.main}">${esc(el.name)}</div><div class="prBio" style="color:${colors.sub}">${nl2br(el.bio)}</div></div></div>`;
        break;
              case 'stars':
        const full = Math.floor(el.v||0);
        const half = (el.v||0) % 1 >= 0.5;
        h += `<div class="stars" style="${as}">${'★'.repeat(full)}${half?'☆':''}${'☆'.repeat(5-full-(half?1:0))}</div>`;
        break;
      case 'progress':
        h += `<div class="progress" style="${as}"><div class="prgLabel" style="color:${colors.main}">${esc(el.prgLabel||'')}</div><div class="prgBar"><div class="prgFill" style="width:${el.v||50}%;background:linear-gradient(135deg,${colors.gS},${colors.gE})"></div></div><div style="font-size:11px;color:${colors.sub};margin-top:4px">${el.v||50}%</div></div>`;
        break;
      case 'toc':
        h += `<div class="toc" style="${as}">`;
        (el.items||[]).forEach((it,i)=>{
          h += `<a style="color:${colors.ac}">${i+1}. ${esc(it)}</a>`;
        });
        h += '</div>';
        break;
      case 'accordion':
        (el.items||[]).forEach(it=>{
          h += `<details class="acc-item"><summary style="color:${colors.main}">${esc(it.t)}</summary><div class="accBody" style="color:${colors.body}">${nl2br(it.v)}</div></details>`;
        });
        break;
      case 'table':
        h += '<div style="overflow-x:auto;margin:16px 0"><table style="width:100%;border-collapse:collapse;font-size:14px">';
        if(el.headers){
          h += '<thead><tr>';
          el.headers.forEach(th=>{
            h += `<th style="background:${colors.acL};color:${colors.main};padding:10px 14px;text-align:left;font-weight:700;border-bottom:2px solid ${colors.ac}">${esc(th)}</th>`;
          });
          h += '</tr></thead>';
        }
        h += '<tbody>';
        (el.rows||[]).forEach((row,ri)=>{
          h += `<tr style="background:${ri%2===0?'transparent':colors.acL+'33'}">`;
          row.forEach(cell=>{
            h += `<td style="padding:10px 14px;border-bottom:1px solid #e2e8f0;color:${colors.body}">${esc(cell)}</td>`;
          });
          h += '</tr>';
        });
        h += '</tbody></table></div>';
        break;
      case 'flow':
        h += `<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:${a==='center'?'center':a==='right'?'flex-end':'flex-start'};margin:16px 0">`;
        (el.items||[]).forEach((it,i)=>{
          if(i>0) h += `<span style="font-size:20px;color:${colors.ac}">→</span>`;
          h += `<div style="background:${colors.acL};padding:10px 20px;border-radius:10px;font-weight:600;font-size:14px;color:${colors.main};border:1px solid ${colors.ac}30">${esc(it)}</div>`;
        });
        h += '</div>';
        break;
      case 'divider':
        h += '<div class="divider"></div>';
        break;
      case 'spacer':
        h += '<div class="spacer"></div>';
        break;
    }
  });

  h += '</div></div>'; // close .inner and .pvCard
  return h;
}

function dlFile(){
  const html = document.getElementById('exportArea').value;
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'scroll-doc.html';
  a.click();
}
