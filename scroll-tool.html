<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スクロール資料ジェネレーター Pro Max</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--ac:#7c3aed;--acL:#f5f3ff;--acG:linear-gradient(135deg,#7c3aed,#a78bfa);--main:#0f172a;--bg:#f0f0f5;--card:#fff;--R:16px;--sh:0 1px 3px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP','Inter',sans-serif;background:#e8e8ed;color:#333;line-height:1.7;font-size:13px;overflow:hidden;height:100vh}
::selection{background:var(--acL);color:var(--ac)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d0d0d0;border-radius:3px}

/* HEADER */
.hd{background:var(--acG);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:10;box-shadow:0 2px 20px rgba(124,58,237,.2)}
.hd h1{font-size:16px;font-weight:900;display:flex;align-items:center;gap:8px}
.hd-actions{display:flex;gap:8px}

/* LAYOUT */
.wrap{display:flex;height:calc(100vh - 52px)}
.pL{width:400px;min-width:400px;background:#fff;display:flex;flex-direction:column;border-right:1px solid #e5e5e5}
.pR{flex:1;overflow-y:auto;background:var(--bg);padding:28px}

/* LEFT PANEL TABS */
.pL-tabs{display:flex;border-bottom:1px solid #eee;flex-shrink:0}
.pL-tab{flex:1;padding:12px 8px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;color:#aaa;border-bottom:2px solid transparent;transition:.2s}
.pL-tab.on{color:var(--ac);border-color:var(--ac);background:var(--acL)}
.pL-tab:hover{background:#fafafa}
.pL-body{flex:1;overflow-y:auto;padding:0}

/* CATEGORY NAV */
.cat-nav{display:flex;flex-wrap:wrap;gap:4px;padding:12px;border-bottom:1px solid #f0f0f0;background:#fafafa}
.cat-btn{padding:5px 11px;border-radius:20px;font-size:10px;font-weight:700;border:1.5px solid #e5e5e5;cursor:pointer;background:#fff;color:#777;transition:.2s;white-space:nowrap}
.cat-btn:hover{border-color:var(--ac);color:var(--ac)}
.cat-btn.on{background:var(--ac);color:#fff;border-color:var(--ac)}

/* TEMPLATE LIST */
.tpl-list{padding:8px}
.tpl-item{border:1.5px solid #eee;border-radius:12px;margin-bottom:8px;overflow:hidden;transition:.2s;background:#fff}
.tpl-item:hover{border-color:#ccc;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.tpl-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px}
.tpl-head-left{display:flex;align-items:center;gap:8px}
.tpl-head-left .tpl-icon{font-size:18px}
.tpl-head-left h4{font-size:12px;font-weight:700;color:var(--main)}
.tpl-head-left span{font-size:10px;color:#aaa;display:block;margin-top:1px}
.tpl-use{padding:5px 14px;border:none;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;color:#fff;background:var(--acG);transition:.2s}
.tpl-use:hover{box-shadow:0 4px 12px rgba(124,58,237,.3);transform:translateY(-1px)}
.tpl-pv{padding:8px 12px;border-top:1px solid #f5f5f5;background:#fafafa;max-height:0;overflow:hidden;transition:max-height .3s}
.tpl-item.open .tpl-pv{max-height:600px}
.tpl-toggle{padding:4px 10px;border:none;border-radius:6px;font-size:10px;cursor:pointer;background:#f0f0f0;color:#999;margin-right:6px}
.tpl-toggle:hover{background:#e8e8e8}

/* EDITOR */
.ed-wrap{padding:12px}
.ed-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 4px}
.sec-card{background:#fafafa;border:1.5px solid #e8e8e8;border-radius:12px;margin-bottom:8px;overflow:hidden;transition:.15s}
.sec-card:hover{border-color:#ddd}
.sec-card-hd{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;user-select:none}
.sec-card-hd h3{font-size:12px;font-weight:700;color:var(--ac);display:flex;align-items:center;gap:6px}
.sec-card-hd .num{background:var(--ac);color:#fff;width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0}
.sec-card-hd .arr{color:#ccc;font-size:9px;transition:.2s}.sec-card.shut .sec-card-bd{display:none}.sec-card.shut .arr{transform:rotate(-90deg)}
.sec-card-bd{padding:0 14px 14px}

label{display:block;font-size:10px;font-weight:600;color:#999;margin:8px 0 3px;letter-spacing:.3px}
input[type=text],textarea,select{width:100%;padding:7px 10px;border:1.5px solid #e2e2e2;border-radius:8px;font-family:inherit;font-size:12px;line-height:1.6;background:#fff;transition:.15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px rgba(124,58,237,.06)}
textarea{resize:vertical;min-height:44px}
.rw{display:flex;gap:6px}.rw>*{flex:1}

/* Align bar */
.al-bar{display:inline-flex;gap:1px;background:#f0f0f0;border-radius:7px;padding:2px;margin-top:3px}
.al-btn{padding:4px 10px;font-size:10px;border:none;background:transparent;border-radius:6px;cursor:pointer;color:#aaa;font-weight:600;transition:.15s}
.al-btn.on{background:#fff;color:var(--ac);box-shadow:0 1px 3px rgba(0,0,0,.06)}

/* Element items */
.eli{background:#fff;border:1.5px solid #eee;border-radius:8px;padding:8px 10px;margin-bottom:5px;transition:.15s}
.eli:hover{border-color:#ddd}
.eli-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.eli-top span{font-size:10px;font-weight:700;color:var(--ac)}
.eli-x{background:none;border:none;color:#ddd;cursor:pointer;font-size:13px;padding:0;line-height:1;transition:.15s}.eli-x:hover{color:#ef4444}
.add-bar{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px}
.add-b{padding:3px 8px;font-size:9px;border-radius:5px;background:var(--acL);color:var(--ac);font-weight:600;border:none;cursor:pointer;transition:.15s}
.add-b:hover{background:var(--ac);color:#fff}

.img-drop{border:2px dashed #ddd;border-radius:8px;padding:14px;text-align:center;cursor:pointer;font-size:10px;color:#bbb;transition:.15s;position:relative}
.img-drop:hover{border-color:var(--ac);color:var(--ac)}
.img-drop input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-thumb{max-width:100%;max-height:60px;border-radius:6px;margin-top:4px;object-fit:cover}

/* Buttons */
button{font-family:inherit;cursor:pointer;transition:.15s}
.btn-main{padding:7px 16px;border:none;border-radius:8px;font-size:11px;font-weight:700;color:#fff;background:var(--acG)}
.btn-main:hover{box-shadow:0 4px 12px rgba(124,58,237,.25)}
.btn-ghost{padding:6px 14px;border:1.5px solid #e2e2e2;border-radius:8px;font-size:11px;font-weight:600;color:#666;background:#fff}
.btn-ghost:hover{border-color:var(--ac);color:var(--ac)}
.btn-xs{padding:3px 8px;font-size:10px;border:none;border-radius:5px;background:#f0f0f0;color:#888;font-weight:600}
.btn-xs:hover{background:#e5e5e5}
.btn-del{padding:3px 8px;font-size:10px;border:1px solid #fcc;border-radius:5px;background:#fff;color:#ef4444;font-weight:600}
.btn-del:hover{background:#ef4444;color:#fff}
.btn-export{padding:8px 24px;border:none;border-radius:10px;font-size:12px;font-weight:700;color:#fff;background:var(--acG);box-shadow:0 4px 16px rgba(124,58,237,.2)}

/* THEME DOTS */
.th-dots{display:flex;gap:6px;align-items:center}
.th-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:.15s}
.th-dot:hover{transform:scale(1.15)}.th-dot.on{border-color:#fff;box-shadow:0 0 0 2px var(--main)}

/* SETTINGS BAR */
.settings-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #f0f0f0;flex-shrink:0;background:#fafafa}
.settings-bar label{margin:0;font-size:10px;color:#888;white-space:nowrap}
.settings-bar select{width:auto;padding:4px 24px 4px 8px;font-size:11px}

/* PREVIEW */
.pv-area{max-width:700px;margin:0 auto}
.empty-pv{text-align:center;color:#bbb;padding:80px 20px;font-size:13px}
.pv-progress{position:fixed;top:52px;left:400px;right:0;height:3px;background:#e5e5e5;z-index:5}
.pv-progress-bar{height:100%;background:var(--acG);transition:width .3s;border-radius:0 2px 2px 0}

/* === PRO CARD RENDERING === */
.pc{background:#fff;border-radius:20px;box-shadow:var(--sh);position:relative;overflow:hidden}
.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.pc-pad{padding:44px 40px}
.pc-pad-narrow{padding:32px 40px}
.pc-full-img{width:100%;display:block}
.pc-full-img+.pc-pad{padding-top:28px}

/* Text styles */
.pt-icon{font-size:32px;margin-bottom:6px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.08))}
.pt-label{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px;opacity:.8}
.pt-h1{font-size:26px;font-weight:900;letter-spacing:-.5px;line-height:1.35;margin-bottom:6px}
.pt-h2{font-size:20px;font-weight:900;letter-spacing:-.3px;line-height:1.4;margin-bottom:4px}
.pt-h3{font-size:16px;font-weight:700;line-height:1.5;margin-bottom:4px}
.pt-body{font-size:15.5px;line-height:2.1;white-space:pre-wrap;color:#444}
.pt-small{font-size:12px;color:#999;line-height:1.6}
.pt-note{font-size:12px;color:#999;line-height:1.6;border-left:2px solid #e5e5e5;padding-left:10px;margin-top:12px}

/* KP box */
.pt-kp{margin-top:24px;border-left:4px solid;padding:20px 24px;border-radius:0 14px 14px 0}
.pt-kp-t{font-size:10px;font-weight:700;letter-spacing:2px;margin-bottom:8px}
.pt-kp-b{font-size:14.5px;line-height:2;white-space:pre-wrap;color:#444}

/* Quote */
.pt-quote{margin-top:24px;padding:28px 32px;border-radius:16px;font-size:17px;line-height:1.9;font-weight:500;position:relative}
.pt-quote::before{content:'\201C';font-size:72px;position:absolute;top:-12px;left:18px;opacity:.1;font-family:Georgia,serif}

/* Warning */
.pt-warn{margin-top:20px;border-left:4px solid #f59e0b;padding:20px 24px;border-radius:0 14px 14px 0;background:linear-gradient(135deg,#fffbeb,#fef3c7)}
.pt-warn-b{font-size:15px;line-height:2;white-space:pre-wrap;color:#92400e}

/* Number */
.pt-num{font-size:56px;font-weight:900;line-height:1.1;letter-spacing:-2px;font-family:'Inter',sans-serif;margin:12px 0}

/* Checklist */
.pt-cl{padding:4px 0}
.pt-cl-i{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f5f5f5}
.pt-cl-i:last-child{border:none}
.pt-cl-ic{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700;flex-shrink:0}
.pt-cl-tx{font-size:15px;line-height:1.7;padding-top:2px}

/* Compare */
.pt-cmp{display:flex;gap:16px;margin-top:20px}
.pt-cmp>div{flex:1;border-radius:14px;padding:20px}
.pt-cmp-b{background:linear-gradient(135deg,#fef2f2,#fee2e2)}
.pt-cmp-a{background:linear-gradient(135deg,#f0fdf4,#dcfce7)}
.pt-cmp-lb{font-size:11px;font-weight:700;letter-spacing:1.5px;margin-bottom:6px}
.pt-cmp-tx{font-size:14px;line-height:1.8;white-space:pre-wrap}

/* Bubble */
.pt-bq{margin-top:12px;display:flex}
.pt-bq-q{justify-content:flex-end}.pt-bq-a{justify-content:flex-start}
.pt-bq-box{border-radius:20px;padding:16px 22px;max-width:82%;font-size:15px;line-height:1.8}
.pt-bq-q .pt-bq-box{background:#f1f5f9;border-radius:20px 20px 6px 20px;color:#334155}
.pt-bq-a .pt-bq-box{border-radius:20px 20px 20px 6px}

/* Timeline */
.pt-tl-i{display:flex;gap:16px;align-items:flex-start;padding:12px 0}
.pt-tl-time{min-width:56px;font-weight:900;font-size:14px;font-family:'Inter',sans-serif}
.pt-tl-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:5px;box-shadow:0 0 0 4px #fff,0 0 0 5px #e5e5e5}
.pt-tl-tx{font-size:14.5px;line-height:1.7;flex:1}

/* Points */
.pt-pts{margin-top:12px}
.pt-pt{display:flex;gap:16px;margin-bottom:18px;align-items:flex-start}
.pt-pt-n{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex-shrink:0;font-family:'Inter',sans-serif}
.pt-pt-t{font-weight:700;font-size:16px}.pt-pt-d{font-size:13.5px;color:#666;line-height:1.6}

/* Color body */
.pt-cb{border-radius:14px;padding:24px 28px;margin-top:16px;font-size:15.5px;line-height:2;white-space:pre-wrap;font-weight:600}

/* Transition */
.pt-trans{text-align:center;padding:28px 0}.pt-trans-tx{font-size:15px;color:#999;line-height:1.9;margin-bottom:8px}.pt-trans-arr{font-size:28px;opacity:.25}

/* Profile */
.pt-pname{font-size:26px;font-weight:900;margin-top:10px}
.pt-ptitle{font-size:13px;font-weight:600;margin-bottom:10px}

/* QA */
.pt-qa-i{margin-bottom:20px}
.pt-qa-q{display:flex;gap:8px;font-weight:700;font-size:15px;margin-bottom:6px;align-items:flex-start}
.pt-qa-badge{flex-shrink:0;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff}
.pt-qa-a{font-size:14.5px;color:#555;line-height:1.8;padding:14px 18px;border-radius:12px;margin-left:36px}

/* Merit */
.pt-merit-i{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start}
.pt-merit-i:last-child{border:none}
.pt-merit-ic{font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.06))}
.pt-merit-t{font-weight:700;font-size:15px}.pt-merit-d{font-size:13px;color:#888;line-height:1.5;margin-top:1px}

/* CTA */
.pt-cta{text-align:center;margin-top:28px}
.pt-cta-btn{display:inline-block;padding:18px 56px;border-radius:60px;font-weight:900;font-size:18px;color:#fff;letter-spacing:.5px;position:relative;overflow:hidden}
.pt-cta-btn::after{content:'';position:absolute;top:0;left:-100%;width:200%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:shine 3s infinite}
@keyframes shine{0%{left:-100%}100%{left:100%}}

/* Flow */
.pt-flow{display:flex;flex-direction:column;align-items:center;margin-top:16px;gap:6px}
.pt-flow-s{padding:14px 32px;border-radius:12px;font-weight:700;font-size:15px;min-width:200px;text-align:center}
.pt-flow-arr{font-size:16px;opacity:.3}

/* Summary */
.pt-sum{border-radius:14px;padding:24px;margin-top:16px}
.pt-sum-i{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.pt-sum-i:last-child{margin-bottom:0}
.pt-sum-tx{font-size:14.5px;line-height:1.7}

/* Table */
.pt-tbl{width:100%;border-collapse:separate;border-spacing:0;margin:16px 0;border-radius:12px;overflow:hidden;border:1px solid #e5e5e5}
.pt-tbl th{padding:10px 14px;font-size:12px;font-weight:700;text-align:left;border-bottom:2px solid #e5e5e5}
.pt-tbl td{padding:10px 14px;font-size:13px;border-bottom:1px solid #f0f0f0}
.pt-tbl tr:last-child td{border:none}

/* Stars */
.pt-stars{font-size:24px;letter-spacing:2px;margin:8px 0}

/* Price */
.pt-price-old{font-size:20px;color:#999;text-decoration:line-through;margin-right:12px}
.pt-price-new{font-size:40px;font-weight:900;font-family:'Inter',sans-serif}

/* Do Don't */
.pt-dd{display:flex;gap:16px;margin-top:16px}
.pt-dd>div{flex:1;border-radius:14px;padding:20px}
.pt-dd-do{background:#f0fdf4;border:1px solid #bbf7d0}
.pt-dd-dont{background:#fef2f2;border:1px solid #fecaca}
.pt-dd-lb{font-size:11px;font-weight:700;letter-spacing:1.5px;margin-bottom:8px}
.pt-dd-tx{font-size:14px;line-height:1.8;white-space:pre-wrap}

/* Ribbon */
.pt-ribbon{position:absolute;top:16px;right:-30px;background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:4px 36px;transform:rotate(45deg);letter-spacing:1px;box-shadow:0 2px 8px rgba(0,0,0,.15)}

/* Accordion */
.pt-acc{border:1px solid #e5e5e5;border-radius:10px;margin-top:8px;overflow:hidden}
.pt-acc-h{padding:12px 16px;cursor:pointer;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center;background:#fafafa}
.pt-acc-b{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s}
.pt-acc.open .pt-acc-b{max-height:500px;padding:12px 16px}

/* Progress bar */
.pt-prog{height:8px;background:#e5e5e5;border-radius:4px;overflow:hidden;margin:12px 0}
.pt-prog-bar{height:100%;border-radius:4px;transition:width .5s}

/* Divider */
.pt-hr{border:none;border-top:1px solid #eee;margin:24px 0}

/* Image */
.pt-img{width:100%;border-radius:14px;margin:12px 0;box-shadow:0 4px 20px rgba(0,0,0,.05)}
.pt-img-empty{background:linear-gradient(135deg,#f8f8f8,#efefef);border-radius:14px;padding:40px;text-align:center;color:#ccc;font-size:12px;margin:12px 0}
.pt-img-circle{width:120px;height:120px;border-radius:50%;object-fit:cover;margin:0 auto 12px;display:block;box-shadow:0 4px 20px rgba(0,0,0,.08)}

/* Modal */
.mo-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.mo-bg.show{display:flex}
.mo-box{background:#fff;border-radius:20px;padding:28px;width:92%;max-width:640px;max-height:80vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.mo-box h2{font-size:18px;margin-bottom:12px}
.mo-box textarea{height:250px;font-family:'SF Mono',Consolas,monospace;font-size:11px;background:#f8f8f8}

@media(max-width:900px){
  .wrap{flex-direction:column;height:auto;overflow:auto}
  .pL{width:100%;min-width:unset;max-height:50vh}
  .pR{max-height:none}
  .pv-progress{display:none}
}
</style>
</head>
<body>

<div class="hd">
  <h1>✦ スクロール資料 Pro</h1>
  <div class="hd-actions">
    <div class="th-dots" id="thDots"></div>
    <button class="btn-export" onclick="doExport()">エクスポート</button>
  </div>
</div>

<div class="wrap">
<div class="pL">
  <div class="pL-tabs">
    <div class="pL-tab on" onclick="swTab(0)">📦 テンプレート</div>
    <div class="pL-tab" onclick="swTab(1)">✏️ エディタ</div>
    <div class="pL-tab" onclick="swTab(2)">⚙️ 設定</div>
  </div>
  <div class="pL-body" id="tabC"></div>
</div>
<div class="pR" id="pvScroll">
  <div class="pv-area" id="pvArea"><div class="empty-pv">← テンプレートからカードを追加して<br>スクロール資料を作りましょう</div></div>
</div>
</div>

<div class="mo-bg" id="moBg" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="mo-box">
    <h2>HTMLエクスポート</h2>
    <p style="font-size:11px;color:#999;margin-bottom:8px">.htmlファイルとして保存してブラウザで閲覧できます</p>
    <textarea id="expArea" readonly></textarea>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn-main" onclick="navigator.clipboard.writeText(document.getElementById('expArea').value);alert('コピーしました')">コピー</button>
      <button class="btn-main" style="background:#059669" onclick="dlFile()">ダウンロード</button>
      <button class="btn-ghost" onclick="document.getElementById('moBg').classList.remove('show')">閉じる</button>
    </div>
  </div>
</div>

<script>
/* ==========================================
   THEMES
========================================== */

/* ==========================================
   STATE
========================================== */
let secs=[];let uid=0;let aTab=0;

/* ==========================================
   TABS
========================================== */
function swTab(n){aTab=n;document.querySelectorAll('.pL-tab').forEach((t,i)=>t.classList.toggle('on',i===n));renderTab();}
function renderTab(){const c=document.getElementById('tabC');[renderGallery,renderEditor,renderSettings][aTab](c);}

/* ==========================================
   GALLERY
========================================== */
function renderGallery(c){
  const catBtns=CATS.map(cat=>`<div class="cat-btn ${curCat===cat.id?'on':''}" onclick="curCat='${cat.id}';renderTab()">${cat.nm}</div>`).join('');
  const filtered=T.filter(t=>t.cat===curCat);
  const cards=filtered.map(t=>`
    <div class="tpl-item" id="tpl${t.id}">
      <div class="tpl-head">
        <div class="tpl-head-left">
          <span class="tpl-icon">${t.icon||'📄'}</span>
          <div><h4>${t.nm}</h4><span>${t.desc}</span></div>
        </div>
        <div>
          <button class="tpl-toggle" onclick="event.stopPropagation();document.getElementById('tpl${t.id}').classList.toggle('open')">プレビュー</button>
          <button class="tpl-use" onclick="event.stopPropagation();useTpl(${t.id})">＋ 追加</button>
        </div>
      </div>
      <div class="tpl-pv"><div id="gp${t.id}" style="pointer-events:none"></div></div>
    </div>`).join('');
  c.innerHTML=`<div class="cat-nav">${catBtns}</div><div class="tpl-list">${cards}</div>`;
  filtered.forEach(t=>{const el=document.getElementById('gp'+t.id);if(el)el.innerHTML=renderCard(t,cT,true);});
}

function useTpl(id){
  const t=T.find(x=>x.id===id);
  secs.push({id:uid++,tplId:t.id,icon:t.icon,label:t.label,heading:t.heading,align:t.align||'left',els:JSON.parse(JSON.stringify(t.els))});
  swTab(1);renderPv();
}

/* ==========================================
   EDITOR
========================================== */
function renderEditor(c){
  let h=`<div class="ed-wrap"><div class="ed-top"><button class="btn-ghost" onclick="swTab(0)">← テンプレ追加</button><span style="font-size:11px;color:#aaa">${secs.length}セクション</span></div>`;
  if(!secs.length){h+='<div class="empty-pv" style="padding:30px">テンプレートタブから<br>カードを追加してください</div>';}
  else{
    h+=secs.map((s,si)=>{
      const title=s.label||s.heading||`セクション ${si+1}`;
      const elsH=s.els.map((el,ei)=>renderElEd(s.id,el,ei)).join('');
      const addBtns=ELK.map(k=>`<button class="add-b" onclick="addEl(${s.id},'${k.key}')">+ ${k.lb}</button>`).join('');
      return `
      <div class="sec-card" id="sec-${s.id}">
        <div class="sec-card-hd" onclick="togS(${s.id})">
          <h3><span class="num">${si+1}</span>${s.icon||''} ${esc(title)}</h3><span class="arr">▶</span>
        </div>
        <div class="sec-card-bd">
          <div class="rw">
            <div><label>アイコン</label><input type=text value="${esc(s.icon)}" oninput="uf(${s.id},'icon',this.value)" placeholder="🎯"></div>
            <div><label>ラベル</label><input type=text value="${esc(s.label)}" oninput="uf(${s.id},'label',this.value)" placeholder="STEP 1"></div>
          </div>
          <label>見出し</label><input type=text value="${esc(s.heading)}" oninput="uf(${s.id},'heading',this.value)">
          <label>配置</label>
          <div class="al-bar">
            <div class="al-btn ${s.align==='left'?'on':''}" onclick="uf(${s.id},'align','left');renderTab()">← 左</div>
            <div class="al-btn ${s.align==='center'?'on':''}" onclick="uf(${s.id},'align','center');renderTab()">中央</div>
            <div class="al-btn ${s.align==='right'?'on':''}" onclick="uf(${s.id},'align','right');renderTab()">右 →</div>
          </div>
          <label style="margin-top:10px">構成要素</label>
          ${elsH}
          <div class="add-bar">${addBtns}</div>
          <div style="display:flex;justify-content:space-between;margin-top:10px">
            <div><button class="btn-xs" onclick="mvS(${s.id},-1)">↑</button> <button class="btn-xs" onclick="mvS(${s.id},1)">↓</button> <button class="btn-xs" onclick="dupS(${s.id})">複製</button></div>
            <button class="btn-del" onclick="rmS(${s.id})">削除</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }
  h+='</div>';
  c.innerHTML=h;
}

function renderElEd(sid,el,ei){
  const lb=ELK.find(k=>k.key===el.key)?.lb||el.key;
  if(el.key==='divider')return`<div class="eli"><div class="eli-top"><span>── 区切り線 ──</span><button class="eli-x" onclick="rmEl(${sid},${ei})">×</button></div></div>`;
  if(el.key==='image'||el.key==='image_circle')return`<div class="eli"><div class="eli-top"><span>${lb}</span><button class="eli-x" onclick="rmEl(${sid},${ei})">×</button></div>
    <div class="img-drop">📷 クリックで画像追加<input type="file" accept="image/*" onchange="hImg(${sid},${ei},this)"></div>
    ${el.value?`<img class="img-thumb" src="${el.value}">`:''}</div>`;
  if(el.key==='compare'||el.key==='do_dont')return`<div class="eli"><div class="eli-top"><span>${lb}</span><button class="eli-x" onclick="rmEl(${sid},${ei})">×</button></div>
    <label>${el.key==='do_dont'?'Do（やるべきこと）':'Before'}</label><textarea rows=2 oninput="uel(${sid},${ei},'valueBefore',this.value);uel(${sid},${ei},'valueDo',this.value)">${esc(el.valueBefore||el.valueDo||'')}</textarea>
    <label>${el.key==='do_dont'?'Don\'t（やらないこと）':'After'}</label><textarea rows=2 oninput="uel(${sid},${ei},'valueAfter',this.value);uel(${sid},${ei},'valueDont',this.value)">${esc(el.valueAfter||el.valueDont||'')}</textarea></div>`;
  if(el.key==='qa'){
    const items=Array.isArray(el.value)?el.value:[{q:'',a:''}];
    let qaH=items.map((item,qi)=>`<div style="background:#f9f9f9;border-radius:7px;padding:7px;margin-bottom:5px">
      <label>Q${qi+1}</label><input type=text value="${esc(item.q)}" oninput="uqa(${sid},${ei},${qi},'q',this.value)">
      <label>A${qi+1}</label><textarea rows=2 oninput="uqa(${sid},${ei},${qi},'a',this.value)">${esc(item.a)}</textarea>
      <button class="btn-del" style="margin-top:3px" onclick="rmQa(${sid},${ei},${qi})">削除</button></div>`).join('');
    return`<div class="eli"><div class="eli-top"><span>${lb}</span><button class="eli-x" onclick="rmEl(${sid},${ei})">×</button></div>${qaH}<button class="add-b" onclick="addQa(${sid},${ei})">+ 質問追加</button></div>`;
  }
  if(el.key==='price')return`<div class="eli"><div class="eli-top"><span>${lb}</span><button class="eli-x" onclick="rmEl(${sid},${ei})">×</button></div>
    <label>通常価格</label><input type=text value="${esc(el.valueOld||'')}" oninput="uel(${sid},${ei},'valueOld',this.value)" placeholder="500,000円">
    <label>特別価格</label><input type=text value="${esc(el.valueNew||'')}" oninput="uel(${sid},${ei},'valueNew',this.value)" placeholder="198,000円"></div>`;
  if(el.key==='progress')return`<div class="eli"><div class="eli-top"><span>${lb}</span><button class="eli-x" onclick="rmEl(${sid},${ei})">×</button></div>
    <textarea rows=1 oninput="uel(${sid},${ei},'value',this.value)" placeholder="ラベル|数値（例：満足度|98）">${esc(el.value||'')}</textarea></div>`;
  return`<div class="eli"><div class="eli-top"><span>${lb}</span><button class="eli-x" onclick="rmEl(${sid},${ei})">×</button></div>
    <textarea rows="${['number','profile_name','profile_title','cta','stars','ribbon','subtitle','title','heading_sub'].includes(el.key)?1:3}" oninput="uel(${sid},${ei},'value',this.value)" placeholder="">${esc(typeof el.value==='string'?el.value:'')}</textarea></div>`;
}

      <button class="btn-ghost" style="width:100%;margin-bottom:8px" onclick="exportJSON()">データ保存（JSON）</button>
      <button class="btn-ghost" style="width:100%"><label style="margin:0;cursor:pointer;display:block;text-align:center">データ読込（JSON）<input type="file" accept=".json" style="display:none" onchange="importJSON(this)"></label></button>

const G={maxW:700,gap:40,radius:20};

function exportJSON(){
  const d=JSON.stringify({theme:TH.indexOf(cT),sections:secs,settings:G},null,2);
  const b=new Blob([d],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='scroll-data.json';a.click();
}
function importJSON(inp){
  const f=inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.theme!==undefined)cT=TH[d.theme];if(d.sections)secs=d.sections;if(d.settings)Object.assign(G,d.settings);uid=Math.max(0,...secs.map(s=>s.id))+1;renderThDots();renderTab();renderPv();alert('読み込みました');}catch(e){alert('エラー: '+e.message);}};
  r.readAsText(f);
}

/* ==========================================
   EDITOR ACTIONS
========================================== */
function uf(id,f,v){secs.find(s=>s.id===id)[f]=v;renderPv();}
function uel(id,ei,f,v){secs.find(s=>s.id===id).els[ei][f]=v;renderPv();}
function addEl(id,key){
  const el=key==='compare'?{key,valueBefore:'',valueAfter:''}:key==='do_dont'?{key,valueDo:'',valueDont:''}:key==='qa'?{key,value:[{q:'',a:''}]}:key==='price'?{key,valueOld:'',valueNew:''}:{key,value:''};
  secs.find(s=>s.id===id).els.push(el);renderTab();renderPv();
}
function rmEl(id,ei){secs.find(s=>s.id===id).els.splice(ei,1);renderTab();renderPv();}
function hImg(sid,ei,inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{secs.find(s=>s.id===sid).els[ei].value=e.target.result;renderTab();renderPv();};r.readAsDataURL(f);}
function uqa(sid,ei,qi,field,val){const el=secs.find(s=>s.id===sid).els[ei];if(!Array.isArray(el.value))el.value=[{q:'',a:''}];el.value[qi][field]=val;renderPv();}
function addQa(sid,ei){const el=secs.find(s=>s.id===sid).els[ei];if(!Array.isArray(el.value))el.value=[];el.value.push({q:'',a:''});renderTab();renderPv();}
function rmQa(sid,ei,qi){secs.find(s=>s.id===sid).els[ei].value.splice(qi,1);renderTab();renderPv();}
function togS(id){document.getElementById('sec-'+id)?.classList.toggle('shut');}
function rmS(id){if(!confirm('削除しますか？'))return;secs=secs.filter(s=>s.id!==id);renderTab();renderPv();}
function mvS(id,d){const i=secs.findIndex(s=>s.id===id);const j=i+d;if(j<0||j>=secs.length)return;[secs[i],secs[j]]=[secs[j],secs[i]];renderTab();renderPv();}
function dupS(id){const s=secs.find(x=>x.id===id);const n=JSON.parse(JSON.stringify(s));n.id=uid++;const i=secs.findIndex(x=>x.id===id);secs.splice(i+1,0,n);renderTab();renderPv();}

/* ==========================================
   RENDER CARD
========================================== */
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function clr(t,th){return esc(t).replace(/『([^』]*)』/g,`<span style="color:${th.c};font-weight:700">『$1』</span>`);}

function renderCard(s,t,m){
  const p=m?'16px 18px':'44px 40px';
  const al=s.align||'left';const ast=`text-align:${al}`;
  const fs=n=>m?n*.65+'px':n+'px';
  let h='';

  if(s.icon)h+=`<div style="font-size:${fs(32)};margin-bottom:4px;${ast};filter:drop-shadow(0 2px 4px rgba(0,0,0,.08))">${s.icon}</div>`;
  if(s.label)h+=`<div style="font-size:${fs(12)};font-weight:700;letter-spacing:3px;color:${t.c};margin-bottom:4px;${ast}">${esc(s.label)}</div>`;
  if(s.heading)h+=`<div style="font-size:${fs(24)};font-weight:900;color:${t.main};margin-bottom:${m?'8px':'20px'};line-height:1.35;letter-spacing:-.5px;${ast}">${esc(s.heading)}</div>`;

  (s.els||[]).forEach(el=>{
    const v=typeof el.value==='string'?el.value:'';
    switch(el.key){
      case 'title':h+=`<div style="font-size:${fs(36)};font-weight:900;color:${t.main};line-height:1.3;white-space:pre-wrap;${ast}">${clr(v,t)}</div>`;break;
      case 'subtitle':h+=`<div style="font-size:${fs(16)};color:#888;margin-top:8px;white-space:pre-wrap;line-height:1.7;${ast}">${esc(v)}</div>`;break;
      case 'heading_sub':h+=`<div style="font-size:${fs(18)};font-weight:700;color:${t.main};margin:${m?'8px 0 4px':'16px 0 8px'};${ast}">${esc(v)}</div>`;break;
      case 'body':h+=`<div style="font-size:${fs(15.5)};line-height:2.1;white-space:pre-wrap;color:#444;${ast}">${clr(v,t)}</div>`;break;
      case 'small':h+=`<div style="font-size:${fs(12)};color:#999;line-height:1.6;margin-top:12px;white-space:pre-wrap;${ast}">${esc(v)}</div>`;break;
      case 'keypoint':h+=`<div style="margin-top:${m?'8px':'24px'};border-left:4px solid ${t.kpB};padding:${m?'8px 10px':'20px 24px'};background:${t.kpBg};border-radius:0 14px 14px 0"><div style="font-size:${fs(10)};font-weight:700;color:${t.kpB};letter-spacing:2px;margin-bottom:${m?'4px':'8px'}">KEY POINT</div><div style="font-size:${fs(14.5)};line-height:2;white-space:pre-wrap;color:#444">${clr(v,t)}</div></div>`;break;
      case 'quote':h+=`<div style="margin-top:${m?'8px':'24px'};padding:${m?'12px 16px':'28px 32px'};border-radius:16px;background:${t.qBg};font-size:${fs(17)};line-height:1.9;color:${t.main};font-weight:500;position:relative;font-style:italic"><span style="font-size:${m?'32px':'72px'};position:absolute;top:${m?'-6px':'-12px'};left:${m?'10px':'18px'};opacity:.1;font-family:Georgia,serif">"</span>${clr(v,t)}</div>`;break;
      case 'number':h+=`<div style="font-size:${fs(52)};font-weight:900;color:${t.c};line-height:1.1;letter-spacing:-2px;font-family:'Inter',sans-serif;margin:${m?'6px 0':'14px 0'};${ast}">${esc(v)}</div>`;break;
      case 'image':if(v)h+=`<img src="${v}" style="width:100%;border-radius:${m?'8px':'14px'};margin:${m?'6px 0':'14px 0'};box-shadow:0 4px 20px rgba(0,0,0,.05)">`;else h+=`<div style="background:linear-gradient(135deg,#f8f8f8,#efefef);border-radius:${m?'8px':'14px'};padding:${m?'20px':'40px'};text-align:center;color:#ccc;font-size:${fs(12)};margin:${m?'6px 0':'14px 0'}">📷 画像を追加</div>`;break;
      case 'image_circle':if(v)h+=`<img src="${v}" style="width:${m?'50px':'120px'};height:${m?'50px':'120px'};border-radius:50%;object-fit:cover;display:block;margin:0 auto ${m?'6px':'14px'};box-shadow:0 4px 20px rgba(0,0,0,.08)">`;else h+=`<div style="width:${m?'50px':'120px'};height:${m?'50px':'120px'};border-radius:50%;background:linear-gradient(135deg,#f0f0f0,#e5e5e5);margin:0 auto ${m?'6px':'14px'};display:flex;align-items:center;justify-content:center;font-size:${m?'16px':'32px'};color:#ccc">👤</div>`;break;
      case 'warning':h+=`<div style="margin-top:${m?'6px':'20px'};border-left:4px solid #f59e0b;padding:${m?'8px 10px':'20px 24px'};border-radius:0 14px 14px 0;background:linear-gradient(135deg,#fffbeb,#fef3c7)"><div style="font-size:${fs(15)};line-height:2;white-space:pre-wrap;color:#92400e">${clr(v,t)}</div></div>`;break;
      case 'checklist':v.split('\n').filter(Boolean).forEach(l=>{h+=`<div style="display:flex;gap:${m?'6px':'12px'};align-items:flex-start;padding:${m?'4px 0':'10px 0'};border-bottom:1px solid #f5f5f5"><div style="width:${m?'16px':'24px'};height:${m?'16px':'24px'};border-radius:${m?'4px':'7px'};background:${t.c};display:flex;align-items:center;justify-content:center;font-size:${m?'8px':'12px'};color:#fff;font-weight:700;flex-shrink:0">✓</div><span style="font-size:${fs(14.5)};line-height:1.7;padding-top:2px">${esc(l)}</span></div>`;});break;
      case 'checklist_negative':v.split('\n').filter(Boolean).forEach(l=>{h+=`<div style="display:flex;gap:${m?'6px':'12px'};align-items:flex-start;padding:${m?'4px 0':'10px 0'};border-bottom:1px solid #f5f5f5"><div style="width:${m?'16px':'24px'};height:${m?'16px':'24px'};border-radius:${m?'4px':'7px'};background:#ef4444;display:flex;align-items:center;justify-content:center;font-size:${m?'8px':'12px'};color:#fff;font-weight:700;flex-shrink:0">✕</div><span style="font-size:${fs(14.5)};line-height:1.7;padding-top:2px">${esc(l)}</span></div>`;});break;
      case 'compare':h+=`<div style="display:flex;gap:${m?'6px':'16px'};margin-top:${m?'6px':'20px'}"><div style="flex:1;border-radius:14px;padding:${m?'8px':'20px'};background:linear-gradient(135deg,#fef2f2,#fee2e2)"><div style="font-size:${fs(11)};font-weight:700;letter-spacing:1.5px;color:#dc2626;margin-bottom:6px">BEFORE</div><div style="font-size:${fs(14)};line-height:1.8;white-space:pre-wrap;color:#7f1d1d">${esc(el.valueBefore||'')}</div></div><div style="flex:1;border-radius:14px;padding:${m?'8px':'20px'};background:linear-gradient(135deg,#f0fdf4,#dcfce7)"><div style="font-size:${fs(11)};font-weight:700;letter-spacing:1.5px;color:#16a34a;margin-bottom:6px">AFTER</div><div style="font-size:${fs(14)};line-height:1.8;white-space:pre-wrap;color:#14532d">${esc(el.valueAfter||'')}</div></div></div>`;break;
      case 'do_dont':h+=`<div style="display:flex;gap:${m?'6px':'16px'};margin-top:${m?'6px':'20px'}"><div style="flex:1;border-radius:14px;padding:${m?'8px':'20px'};background:#f0fdf4;border:1px solid #bbf7d0"><div style="font-size:${fs(11)};font-weight:700;letter-spacing:1.5px;color:#16a34a;margin-bottom:6px">⭕ DO</div><div style="font-size:${fs(14)};line-height:1.8;white-space:pre-wrap;color:#14532d">${esc(el.valueDo||'')}</div></div><div style="flex:1;border-radius:14px;padding:${m?'8px':'20px'};background:#fef2f2;border:1px solid #fecaca"><div style="font-size:${fs(11)};font-weight:700;letter-spacing:1.5px;color:#dc2626;margin-bottom:6px">✕ DON'T</div><div style="font-size:${fs(14)};line-height:1.8;white-space:pre-wrap;color:#7f1d1d">${esc(el.valueDont||'')}</div></div></div>`;break;
      case 'bubble_q':h+=`<div style="display:flex;justify-content:flex-end;margin-top:${m?'6px':'14px'}"><div style="background:#f1f5f9;border-radius:20px 20px 6px 20px;padding:${m?'8px 12px':'16px 22px'};max-width:82%;font-size:${fs(15)};line-height:1.8;color:#334155">${clr(v,t)}</div></div>`;break;
      case 'bubble_a':h+=`<div style="display:flex;justify-content:flex-start;margin-top:${m?'4px':'8px'}"><div style="background:${t.acL};border-radius:20px 20px 20px 6px;padding:${m?'8px 12px':'16px 22px'};max-width:82%;font-size:${fs(15)};line-height:1.8;color:${t.main}">${clr(v,t)}</div></div>`;break;
      case 'timeline':v.split('\n').filter(Boolean).forEach(l=>{const[time,...rest]=l.split('|');h+=`<div style="display:flex;gap:${m?'6px':'16px'};align-items:flex-start;padding:${m?'4px 0':'12px 0'}"><div style="min-width:${m?'30px':'56px'};font-weight:900;color:${t.c};font-size:${fs(14)};font-family:'Inter',sans-serif">${esc(time)}</div><div style="width:${m?'8px':'12px'};height:${m?'8px':'12px'};border-radius:50%;background:${t.c};flex-shrink:0;margin-top:${m?'3px':'5px'};box-shadow:0 0 0 4px #fff,0 0 0 5px #e5e5e5"></div><div style="font-size:${fs(14.5)};line-height:1.7;flex:1">${esc(rest.join('|'))}</div></div>`;});break;
      case 'points3':h+=`<div style="margin-top:${m?'6px':'14px'}">`;v.split('\n').filter(Boolean).forEach((l,i)=>{const[title,...desc]=l.split('|');h+=`<div style="display:flex;gap:${m?'8px':'16px'};margin-bottom:${m?'8px':'18px'};align-items:flex-start"><div style="width:${m?'22px':'40px'};height:${m?'22px':'40px'};border-radius:12px;background:${t.acL};color:${t.c};display:flex;align-items:center;justify-content:center;font-weight:900;font-size:${fs(18)};flex-shrink:0;font-family:'Inter',sans-serif">${i+1}</div><div><div style="font-weight:700;font-size:${fs(16)};color:${t.main}">${esc(title)}</div><div style="font-size:${fs(13.5)};color:#666;line-height:1.6">${esc(desc.join('|'))}</div></div></div>`;});h+='</div>';break;
      case 'colored_body':h+=`<div style="background:${t.acL};border-radius:14px;padding:${m?'10px 14px':'24px 28px'};margin-top:${m?'6px':'16px'};font-size:${fs(15.5)};line-height:2;white-space:pre-wrap;color:${t.main};font-weight:600;${ast}">${clr(v,t)}</div>`;break;
      case 'transition':h+=`<div style="text-align:center;padding:${m?'10px 0':'28px 0'}"><div style="font-size:${fs(15)};color:#999;line-height:1.9;white-space:pre-wrap;margin-bottom:8px">${clr(v,t)}</div><div style="font-size:${fs(28)};opacity:.25">↓</div></div>`;break;
      case 'profile_name':h+=`<div style="font-size:${fs(26)};font-weight:900;color:${t.main};margin-top:8px;${ast}">${esc(v)}</div>`;break;
      case 'profile_title':h+=`<div style="font-size:${fs(13)};color:${t.c};font-weight:600;margin-bottom:10px;${ast}">${esc(v)}</div>`;break;
      case 'qa':const qaI=Array.isArray(el.value)?el.value:[];qaI.forEach(item=>{h+=`<div style="margin-bottom:${m?'8px':'20px'}"><div style="display:flex;gap:8px;font-weight:700;font-size:${fs(15)};color:${t.main};margin-bottom:6px;align-items:flex-start"><span style="flex-shrink:0;width:${m?'18px':'28px'};height:${m?'18px':'28px'};border-radius:8px;background:${t.c};color:#fff;display:flex;align-items:center;justify-content:center;font-size:${fs(13)};font-weight:900">Q</span><span style="padding-top:${m?'1px':'3px'}">${esc(item.q)}</span></div><div style="font-size:${fs(14.5)};color:#555;line-height:1.8;padding:${m?'8px 10px':'14px 18px'};background:${t.acL};border-radius:12px;margin-left:${m?'22px':'36px'}">${esc(item.a)}</div></div>`;});break;
      case 'merit_list':v.split('\n').filter(Boolean).forEach(l=>{const pts=l.split('|');h+=`<div style="display:flex;gap:${m?'8px':'16px'};padding:${m?'6px 0':'16px 0'};border-bottom:1px solid #f5f5f5;align-items:flex-start"><span style="font-size:${fs(28)};filter:drop-shadow(0 2px 4px rgba(0,0,0,.06))">${pts[0]||'✨'}</span><div><div style="font-weight:700;font-size:${fs(15)};color:${t.main}">${esc(pts[1]||'')}</div><div style="font-size:${fs(13)};color:#888;line-height:1.5">${esc(pts[2]||'')}</div></div></div>`;});break;
      case 'cta':h+=`<div style="text-align:center;margin-top:${m?'10px':'28px'}"><div style="display:inline-block;background:${t.grad};color:#fff;padding:${m?'8px 20px':'18px 56px'};border-radius:60px;font-weight:900;font-size:${fs(18)};box-shadow:0 8px 30px ${t.c}40;letter-spacing:.5px">${esc(v)}</div></div>`;break;
      case 'flow':h+=`<div style="display:flex;flex-direction:column;align-items:center;margin-top:${m?'6px':'16px'};gap:${m?'3px':'6px'}">`;v.split('\n').filter(Boolean).forEach((step,i,arr)=>{h+=`<div style="background:${t.acL};color:${t.main};padding:${m?'6px 14px':'14px 32px'};border-radius:12px;font-weight:700;font-size:${fs(15)};min-width:${m?'80px':'200px'};text-align:center">${esc(step)}</div>`;if(i<arr.length-1)h+=`<div style="color:${t.c};font-size:${fs(16)};opacity:.4">▼</div>`;});h+='</div>';break;
      case 'summary':h+=`<div style="background:${t.kpBg};border-radius:14px;padding:${m?'10px':'24px'};margin-top:${m?'6px':'16px'}">`;v.split('\n').filter(Boolean).forEach(l=>{h+=`<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:${m?'4px':'10px'}"><span style="color:${t.c};font-size:${fs(15)};margin-top:1px">✦</span><span style="font-size:${fs(14.5)};line-height:1.7">${esc(l)}</span></div>`;});h+='</div>';break;
      case 'table':const rows=v.split('\n').filter(Boolean).map(r=>r.split('|').filter(c=>c!==''));if(rows.length){h+=`<div style="overflow-x:auto;margin:${m?'6px 0':'16px 0'}"><table style="width:100%;border-collapse:separate;border-spacing:0;border-radius:12px;overflow:hidden;border:1px solid #e5e5e5">`;rows.forEach((r,ri)=>{h+='<tr>';r.forEach(c=>{if(ri===0)h+=`<th style="padding:${m?'6px 8px':'10px 14px'};font-size:${fs(12)};font-weight:700;background:${t.acL};color:${t.main};text-align:left;border-bottom:2px solid #e5e5e5">${esc(c.trim())}</th>`;else h+=`<td style="padding:${m?'6px 8px':'10px 14px'};font-size:${fs(13)};border-bottom:1px solid #f0f0f0">${esc(c.trim())}</td>`;});h+='</tr>';});h+='</table></div>';}break;
      case 'stars':const sv=parseFloat(v)||5;h+=`<div style="font-size:${fs(24)};letter-spacing:2px;margin:8px 0;${ast}">${'★'.repeat(Math.floor(sv))}${'☆'.repeat(5-Math.floor(sv))}<span style="font-size:${fs(14)};color:#888;margin-left:8px;font-weight:700">${sv}</span></div>`;break;
      case 'price':h+=`<div style="${ast};margin:${m?'8px 0':'16px 0'}"><span style="font-size:${fs(20)};color:#999;text-decoration:line-through;margin-right:12px">${esc(el.valueOld||'')}</span><span style="font-size:${fs(40)};font-weight:900;color:${t.c};font-family:'Inter',sans-serif">${esc(el.valueNew||'')}</span></div>`;break;
      case 'progress':const pp=v.split('|');const plb=pp[0]||'';const pv=parseInt(pp[1])||0;h+=`<div style="margin:${m?'4px 0':'10px 0'}"><div style="display:flex;justify-content:space-between;font-size:${fs(12)};font-weight:600;margin-bottom:4px"><span>${esc(plb)}</span><span style="color:${t.c}">${pv}%</span></div><div style="height:${m?'6px':'8px'};background:#e5e5e5;border-radius:4px;overflow:hidden"><div style="height:100%;width:${pv}%;background:${t.grad};border-radius:4px"></div></div></div>`;break;
      case 'ribbon':h+=`<div style="position:absolute;top:16px;right:-28px;background:#ef4444;color:#fff;font-size:${fs(10)};font-weight:700;padding:4px 36px;transform:rotate(45deg);letter-spacing:1px;box-shadow:0 2px 8px rgba(0,0,0,.15)">${esc(v)}</div>`;break;
      case 'toc':h+=`<div style="margin-top:${m?'6px':'12px'}">`;v.split('\n').filter(Boolean).forEach((l,i)=>{h+=`<div style="display:flex;align-items:center;gap:${m?'8px':'14px'};padding:${m?'5px 0':'12px 0'};border-bottom:1px solid #f5f5f5;font-size:${fs(15)}"><span style="color:${t.c};font-weight:900;font-family:'Inter',sans-serif;min-width:${m?'16px':'24px'}">${String(i+1).padStart(2,'0')}</span><span style="color:#444">${esc(l)}</span></div>`;});h+='</div>';break;
      case 'accordion':v.split('\n').filter(Boolean).forEach(l=>{const[title,...body]=l.split('|');h+=`<div style="border:1px solid #e5e5e5;border-radius:10px;margin-top:${m?'4px':'8px'};overflow:hidden"><div style="padding:${m?'8px 12px':'12px 16px'};font-weight:700;font-size:${fs(14)};background:#fafafa;display:flex;justify-content:space-between;align-items:center">${esc(title)}<span style="color:#ccc">▼</span></div><div style="padding:${m?'8px 12px':'12px 16px'};font-size:${fs(13.5)};line-height:1.7;color:#555;border-top:1px solid #f0f0f0">${esc(body.join('|'))}</div></div>`;});break;
      case 'divider':h+=`<hr style="border:none;border-top:1px solid #eee;margin:${m?'10px 0':'24px 0'}">`;break;
    }
  });

  const rd=m?12:G.radius;
  return`<div style="background:#fff;border-radius:${rd}px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.06);padding:${p};position:relative;overflow:hidden"><div style="position:absolute;top:0;left:0;right:0;height:4px;background:${t.grad}"></div>${h}</div>`;
}

/* ==========================================
   PREVIEW
========================================== */
function renderPv(){
  const c=document.getElementById('pvArea');
  if(!secs.length){c.innerHTML='<div class="empty-pv">← テンプレートからカードを追加して<br>スクロール資料を作りましょう</div>';return;}
  c.innerHTML=secs.map(s=>`<div style="margin-bottom:${G.gap}px">${renderCard(s,cT,false)}</div>`).join('');
}

/* ==========================================
   EXPORT
========================================== */
function doExport(){
  const blocks=secs.map(s=>renderCard(s,cT,false)).join(`\n<div style="height:${G.gap}px"></div>\n`);
  const html=`<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>スクロール資料</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans JP','Inter',sans-serif;background:${cT.bg};padding:40px 20px}@keyframes shine{0%{left:-100%}100%{left:100%}}</style>
</head><body>
<div style="max-width:${G.maxW}px;margin:0 auto">
${blocks}
</div>
</body></html>`;
  document.getElementById('expArea').value=html;
  document.getElementById('moBg').classList.add('show');
}
function dlFile(){const b=new Blob([document.getElementById('expArea').value],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='scroll-doc.html';a.click();}

/* ==========================================
   INIT
========================================== */
renderTab();
</script>
</body>
</html>
