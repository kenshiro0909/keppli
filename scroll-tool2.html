<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スクロール資料ジェネレーター Pro Max v2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--ac:#7c3aed;--acL:#f5f3ff;--acG:linear-gradient(135deg,#7c3aed,#a78bfa);--main:#0f172a;--bg:#f0f0f5;--sh:0 1px 3px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP','Inter',sans-serif;background:#e8e8ed;color:#333;line-height:1.7;font-size:13px;overflow:hidden;height:100vh}
::selection{background:var(--acL);color:var(--ac)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#d0d0d0;border-radius:3px}

.hd{background:var(--acG);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;z-index:10;box-shadow:0 2px 20px rgba(124,58,237,.2)}
.hd h1{font-size:15px;font-weight:900;display:flex;align-items:center;gap:6px}
.hd-right{display:flex;gap:8px;align-items:center}
.th-dots{display:flex;gap:5px}.th-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:.15s}.th-dot:hover{transform:scale(1.15)}.th-dot.on{border-color:#fff;box-shadow:0 0 0 2px var(--main)}

.wrap{display:flex;height:calc(100vh - 48px)}
.pL{width:420px;min-width:420px;background:#fff;display:flex;flex-direction:column;border-right:1px solid #e5e5e5}
.pR{flex:1;overflow-y:auto;background:var(--bg);padding:24px}

.pL-tabs{display:flex;border-bottom:1px solid #eee;flex-shrink:0}
.pL-tab{flex:1;padding:10px 6px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;color:#aaa;border-bottom:2px solid transparent;transition:.15s}
.pL-tab.on{color:var(--ac);border-color:var(--ac);background:var(--acL)}
.pL-body{flex:1;overflow-y:auto;padding:0}

.cat-nav{display:flex;flex-wrap:wrap;gap:3px;padding:10px;border-bottom:1px solid #f0f0f0;background:#fafafa}
.cat-btn{padding:4px 10px;border-radius:16px;font-size:10px;font-weight:700;border:1.5px solid #e5e5e5;cursor:pointer;background:#fff;color:#777;transition:.15s;white-space:nowrap}
.cat-btn:hover{border-color:var(--ac);color:var(--ac)}.cat-btn.on{background:var(--ac);color:#fff;border-color:var(--ac)}

.tpl-list{padding:8px}
.tpl-item{border:1.5px solid #eee;border-radius:10px;margin-bottom:6px;overflow:hidden;background:#fff;transition:.15s}
.tpl-item:hover{border-color:#ddd}
.tpl-head{display:flex;justify-content:space-between;align-items:center;padding:8px 12px}
.tpl-info{display:flex;align-items:center;gap:6px}
.tpl-info h4{font-size:11px;font-weight:700;color:var(--main)}.tpl-info span{font-size:9px;color:#aaa;display:block}
.tpl-actions{display:flex;gap:4px}
.tpl-btn{padding:4px 12px;border:none;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;transition:.15s}
.tpl-pv-btn{background:#f0f0f0;color:#888}.tpl-pv-btn:hover{background:#e5e5e5}
.tpl-add-btn{background:var(--acG);color:#fff}.tpl-add-btn:hover{box-shadow:0 2px 8px rgba(124,58,237,.3)}
.tpl-pv{padding:8px;border-top:1px solid #f0f0f0;background:#fafafa;max-height:0;overflow:hidden;transition:max-height .3s}
.tpl-item.open .tpl-pv{max-height:600px}

/* Editor */
.ed-wrap{padding:10px}
.ed-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

.sec-card{background:#fafafa;border:1.5px solid #e8e8e8;border-radius:10px;margin-bottom:6px;overflow:hidden;transition:.15s}
.sec-card:hover{border-color:#ddd}
.sec-card-hd{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;cursor:pointer;user-select:none}
.sec-card-hd h3{font-size:11px;font-weight:700;color:var(--ac);display:flex;align-items:center;gap:5px}
.sec-card-hd .num{background:var(--ac);color:#fff;width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0}
.sec-card-hd .arr{color:#ccc;font-size:9px;transition:.15s}
.sec-card.shut .sec-card-bd{display:none}.sec-card.shut .arr{transform:rotate(-90deg)}
.sec-card-bd{padding:0 12px 12px}

label{display:block;font-size:9px;font-weight:600;color:#999;margin:7px 0 2px;letter-spacing:.3px}
input[type=text],input[type=url],textarea,select{width:100%;padding:6px 9px;border:1.5px solid #e2e2e2;border-radius:7px;font-family:inherit;font-size:11px;line-height:1.5;background:#fff;transition:.15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 2px rgba(124,58,237,.06)}
textarea{resize:vertical;min-height:38px}
.rw{display:flex;gap:5px}.rw>*{flex:1}

.al-bar{display:inline-flex;gap:1px;background:#f0f0f0;border-radius:6px;padding:1.5px}
.al-btn{padding:3px 8px;font-size:9px;border:none;background:transparent;border-radius:5px;cursor:pointer;color:#aaa;font-weight:600;transition:.1s}
.al-btn.on{background:#fff;color:var(--ac);box-shadow:0 1px 3px rgba(0,0,0,.05)}

/* Element drag & drop */
.eli{background:#fff;border:1.5px solid #eee;border-radius:7px;padding:7px 9px;margin-bottom:4px;transition:.15s;position:relative}
.eli:hover{border-color:#ddd}
.eli.dragging{opacity:.4;border:2px dashed var(--ac)}
.eli.drag-over{border-color:var(--ac);box-shadow:0 0 0 2px var(--acL)}
.eli-grip{cursor:grab;color:#ccc;font-size:11px;margin-right:6px;user-select:none;display:inline-block;vertical-align:middle}
.eli-grip:active{cursor:grabbing}
.eli-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.eli-top-left{display:flex;align-items:center;gap:4px}
.eli-top span{font-size:9px;font-weight:700;color:var(--ac)}
.eli-label-edit{font-size:9px;font-weight:700;color:var(--ac);background:none;border:none;border-bottom:1px dashed transparent;padding:0 2px;font-family:inherit;cursor:text;width:auto;min-width:40px;max-width:160px;transition:.15s}
.eli-label-edit:hover{border-color:var(--ac)}
.eli-label-edit:focus{outline:none;border-color:var(--ac);background:var(--acL)}
.eli-btns{display:flex;gap:3px;align-items:center}
.eli-x{background:none;border:none;color:#ddd;cursor:pointer;font-size:12px;padding:0;line-height:1;transition:.1s}.eli-x:hover{color:#ef4444}
.el-al{margin-top:3px}

.add-bar{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px}
.add-b{padding:3px 7px;font-size:9px;border-radius:5px;background:var(--acL);color:var(--ac);font-weight:600;border:none;cursor:pointer;transition:.15s}
.add-b:hover{background:var(--ac);color:#fff}

.img-drop{border:2px dashed #ddd;border-radius:7px;padding:10px;text-align:center;cursor:pointer;font-size:10px;color:#bbb;transition:.15s;position:relative}
.img-drop:hover{border-color:var(--ac);color:var(--ac)}
.img-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-thumb{max-width:100%;max-height:50px;border-radius:5px;margin-top:3px;object-fit:cover}
.img-url-row{display:flex;gap:4px;margin-top:4px}
.img-url-row input{flex:1;font-size:10px;padding:5px 8px}
.img-url-row button{flex-shrink:0}

button{font-family:inherit;cursor:pointer;transition:.15s}
.btn-main{padding:6px 14px;border:none;border-radius:7px;font-size:10px;font-weight:700;color:#fff;background:var(--acG)}
.btn-ghost{padding:5px 12px;border:1.5px solid #e2e2e2;border-radius:7px;font-size:10px;font-weight:600;color:#666;background:#fff}
.btn-ghost:hover{border-color:var(--ac);color:var(--ac)}
.btn-xs{padding:2px 7px;font-size:9px;border:none;border-radius:4px;background:#f0f0f0;color:#888;font-weight:600}
.btn-xs:hover{background:#e5e5e5}
.btn-del{padding:3px 8px;font-size:9px;border:1px solid #fcc;border-radius:5px;background:#fff;color:#ef4444;font-weight:600}
.btn-del:hover{background:#ef4444;color:#fff}
.btn-export{padding:7px 20px;border:none;border-radius:8px;font-size:11px;font-weight:700;color:#fff;background:var(--acG)}

.pv-area{max-width:700px;margin:0 auto}
.empty-pv{text-align:center;color:#bbb;padding:60px 20px;font-size:12px}

/* Drag insert indicator */
.drop-indicator{height:3px;background:var(--ac);border-radius:2px;margin:2px 0;transition:.15s}

/* Modal */
.mo-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:center;backdrop-filter:blur(3px)}
.mo-bg.show{display:flex}
.mo-box{background:#fff;border-radius:16px;padding:24px;width:92%;max-width:620px;max-height:80vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.mo-box h2{font-size:16px;margin-bottom:10px}.mo-box textarea{height:220px;font-family:'SF Mono',Consolas,monospace;font-size:10px;background:#f8f8f8}
.mo-box p{font-size:10px;color:#999;margin-bottom:6px}

/* Image help modal */
.help-box{background:#f8f8ff;border:1px solid #e8e8f8;border-radius:8px;padding:12px;margin-top:8px;font-size:10px;line-height:1.7;color:#666}
.help-box h4{font-size:11px;color:var(--ac);margin-bottom:4px}
.help-box a{color:var(--ac)}

@media(max-width:900px){.wrap{flex-direction:column;height:auto;overflow:auto}.pL{width:100%;min-width:unset;max-height:50vh}.pR{max-height:none}}
</style>
</head>
<body>

<div class="hd">
  <h1>✦ スクロール資料 Pro</h1>
  <div class="hd-right">
    <div class="th-dots" id="thDots"></div>
    <button class="btn-export" onclick="doExport()">エクスポート</button>
  </div>
</div>

<div class="wrap">
<div class="pL">
  <div class="pL-tabs">
    <div class="pL-tab on" onclick="swTab(0)">📦 テンプレ</div>
    <div class="pL-tab" onclick="swTab(1)">✏️ エディタ</div>
    <div class="pL-tab" onclick="swTab(2)">⚙️ 設定</div>
  </div>
  <div class="pL-body" id="tabC"></div>
</div>
<div class="pR" id="pvScroll">
  <div class="pv-area" id="pvArea"><div class="empty-pv">← テンプレートからカードを追加してください</div></div>
</div>
</div>

<div class="mo-bg" id="moBg" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="mo-box">
    <h2>HTMLエクスポート</h2>
    <p>.htmlファイルとしてダウンロードできます</p>
    <textarea id="expArea" readonly></textarea>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button class="btn-main" onclick="navigator.clipboard.writeText(document.getElementById('expArea').value);alert('コピーしました')">コピー</button>
      <button class="btn-main" style="background:#059669" onclick="dlFile()">ダウンロード</button>
      <button class="btn-ghost" onclick="document.getElementById('moBg').classList.remove('show')">閉じる</button>
    </div>
  </div>
</div>

<script>
/* ============ THEMES ============ */
const TH=[
  {nm:'ビジネス',c:'#2563eb',main:'#0f172a',acL:'#eff6ff',kpB:'#2563eb',kpBg:'#f0f5ff',qBg:'#eff6ff',bg:'#f1f5f9',grad:'linear-gradient(135deg,#2563eb,#3b82f6)'},
  {nm:'恋愛',c:'#ec4899',main:'#4a0e2b',acL:'#fdf2f8',kpB:'#ec4899',kpBg:'#fdf2f8',qBg:'#fdf2f8',bg:'#fdf5f9',grad:'linear-gradient(135deg,#ec4899,#f472b6)'},
  {nm:'占い',c:'#7c3aed',main:'#1e1049',acL:'#f5f3ff',kpB:'#7c3aed',kpBg:'#f5f3ff',qBg:'#f5f3ff',bg:'#f5f3ff',grad:'linear-gradient(135deg,#7c3aed,#8b5cf6)'},
  {nm:'自己啓発',c:'#ea580c',main:'#431407',acL:'#fff7ed',kpB:'#ea580c',kpBg:'#fff7ed',qBg:'#fff7ed',bg:'#fef6ee',grad:'linear-gradient(135deg,#ea580c,#f97316)'},
  {nm:'健康',c:'#059669',main:'#052e16',acL:'#f0fdf4',kpB:'#059669',kpBg:'#f0fdf4',qBg:'#f0fdf4',bg:'#f0fdf4',grad:'linear-gradient(135deg,#059669,#10b981)'},
  {nm:'教育',c:'#d97706',main:'#451a03',acL:'#fffbeb',kpB:'#d97706',kpBg:'#fffbeb',qBg:'#fffbeb',bg:'#fffbeb',grad:'linear-gradient(135deg,#d97706,#f59e0b)'},
  {nm:'モノトーン',c:'#374151',main:'#111827',acL:'#f9fafb',kpB:'#6b7280',kpBg:'#f9fafb',qBg:'#f9fafb',bg:'#f3f4f6',grad:'linear-gradient(135deg,#374151,#6b7280)'},
];
let cT=TH[2];
function renderThDots(){document.getElementById('thDots').innerHTML=TH.map((t,i)=>`<div class="th-dot ${t===cT?'on':''}" style="background:${t.c}" onclick="cT=TH[${i}];renderThDots();renderTab();renderPv()" title="${t.nm}"></div>`).join('');}
renderThDots();

/* ============ TEMPLATES ============ */
const CATS=[
  {id:'intro',nm:'🚪 導入'},{id:'problem',nm:'😰 問題提起'},{id:'solution',nm:'💡 解決策'},
  {id:'proof',nm:'📊 証拠'},{id:'offer',nm:'🎁 提案'},{id:'faq',nm:'❓ FAQ'},
  {id:'cta',nm:'🚀 CTA'},{id:'bridge',nm:'🔗 繋ぎ'},{id:'closing',nm:'🎬 締め'},
];
let curCat='intro';

const T=[
{id:1,cat:'intro',nm:'表紙',icon:'📘',align:'center',els:[{key:'title',value:'SNS集客\n完全攻略ガイド',align:'center'},{key:'subtitle',value:'ゼロから始めて月30万を安定させる方法',align:'center'},{key:'small',value:'著者名 / 2026年版',align:'center'}]},
{id:2,cat:'intro',nm:'目次',icon:'📋',heading:'目次',align:'left',els:[{key:'toc',value:'はじめに\nSTEP1：集客の基本\nSTEP2：信頼の構築\nSTEP3：収益化\nまとめ'}]},
{id:3,cat:'intro',nm:'自己紹介',icon:'👤',align:'center',els:[{key:'image_circle',value:'',align:'center'},{key:'profile_name',value:'山田 花子',align:'center'},{key:'profile_title',value:'恋愛カウンセラー / 占い師',align:'center'},{key:'body',value:'はじめまして。\n10年間で3,000人以上の恋愛相談に乗ってきました。',align:'center'}]},
{id:4,cat:'intro',nm:'導入メッセージ',icon:'👋',heading:'はじめに',align:'left',els:[{key:'body',value:'この資料を手に取ってくださり、ありがとうございます。\nこれからお伝えする内容は、私が10年かけて\n試行錯誤してたどり着いた『本質』です。'}]},
{id:5,cat:'intro',nm:'注意書き',icon:'📌',heading:'お読みになる前に',align:'left',els:[{key:'warning',value:'この資料は以下の方を対象としています。\n・SNSでの集客に興味がある方\n・すでにビジネスを持っている方\n\n※効果を保証するものではありません。'}]},

{id:6,cat:'problem',nm:'悩み列挙',icon:'😔',heading:'こんな悩みありませんか？',align:'left',els:[{key:'checklist_negative',value:'毎日投稿しても反応がない\nフォロワーが増えない\n何を書けばいいかわからない\n売上が安定しない'}]},
{id:7,cat:'problem',nm:'共感ストーリー',icon:'📖',heading:'実は、私も同じでした',align:'left',els:[{key:'body',value:'3年前の私は、毎日5時間以上SNSに費やしても\n月の売上はたった3万円でした。'},{key:'quote',value:'こんなに頑張ってるのに、なんで結果が出ないんだろう…'}]},
{id:8,cat:'problem',nm:'NG行動',icon:'🔍',heading:'9割がやるNG行動',align:'left',els:[{key:'do_dont',label:'成功する人 / 失敗する人',valueDo:'ターゲットを絞る\n読者の悩みに寄り添う\n継続的に価値提供',valueDont:'とにかく毎日投稿\nフォロワー数だけ追う\nいきなり売り込む'}]},
{id:9,cat:'problem',nm:'恐怖喚起',icon:'⚡',heading:'このまま何もしなければ…',align:'center',els:[{key:'warning',value:'1年後も同じ悩みを抱えたまま\n時間だけが過ぎていきます。'}]},
{id:10,cat:'problem',nm:'読者の声',icon:'💭',align:'left',els:[{key:'bubble_q',value:'SNSで稼ぐとか、私には無理だと思う…'},{key:'bubble_a',value:'その気持ち、すごくわかります。\nでも「正しい順番」を知るだけで結果は変わります。'}]},

{id:11,cat:'solution',nm:'結論ファースト',icon:'🎯',label:'結論',heading:'答えはシンプルです',align:'center',els:[{key:'number',value:'たった3つ',align:'center'},{key:'body',value:'やることは、たった3つだけ。\nこの3つを正しい順番でやるだけで結果は出ます。',align:'center'}]},
{id:12,cat:'solution',nm:'ステップ解説',icon:'🎯',label:'STEP 1',heading:'Threadsで集客する',align:'left',els:[{key:'body',value:'Threadsでは、\n『これ私のことだ！』と悩みを持ったターゲットに\n刺さる投稿で興味を持ってもらう。'},{key:'keypoint',value:'Threadsの役割は繁華街の看板と同じ。\n投稿で何かを売る必要はありません。'}]},
{id:13,cat:'solution',nm:'ポイント整理',icon:'💡',heading:'成功の3つの鍵',align:'left',els:[{key:'points3',value:'継続する|毎日1投稿を3ヶ月続ける\n分析する|反応の良い投稿を研究する\n改善する|データを元に磨く'}]},
{id:14,cat:'solution',nm:'フロー図',icon:'🗺️',heading:'全体の流れ',align:'center',els:[{key:'flow',value:'Threadsで発信\nLINEオプチャに誘導\n信頼関係を構築\n個別相談\n成約'}]},
{id:15,cat:'solution',nm:'比較表',icon:'⚖️',heading:'プラン比較',align:'center',els:[{key:'table',value:'|項目|ライト|プレミアム\n|個別相談|月1回|無制限\n|教材|一部|全て\n|価格|9,800円|29,800円'}]},
{id:16,cat:'solution',nm:'ビフォーアフター',icon:'🔄',heading:'受講前と受講後',align:'center',els:[{key:'compare',label:'BEFORE / AFTER',valueBefore:'毎日不安で眠れない\n自分に自信がない',valueAfter:'心が穏やかになった\n自分の強みがわかった'}]},
{id:17,cat:'solution',nm:'タイムライン',icon:'📅',heading:'1日のスケジュール',align:'left',els:[{key:'timeline',value:'7:00|朝の投稿をアップ\n12:00|コメント返し\n19:00|夜の投稿をアップ\n22:00|振り返り'}]},
{id:18,cat:'solution',nm:'ケーススタディ',icon:'📋',label:'CASE',heading:'Aさんの場合',align:'left',els:[{key:'body',value:'30代会社員のAさん。副業で占いを始めたものの半年間売上ゼロでした。'},{key:'compare',label:'受講前 / 受講後',valueBefore:'フォロワー200人\n月売上0円',valueAfter:'フォロワー3,000人\n月売上30万円'}]},
{id:19,cat:'solution',nm:'計算ロジック',icon:'🧮',heading:'なぜ3ヶ月で結果が出るのか',align:'left',els:[{key:'number',value:'90投稿 × 1% = 毎日1名',align:'center'},{key:'body',value:'3ヶ月で約90名がLINE登録。\nその10%が有料相談に申し込めば月9件。'}]},
{id:20,cat:'solution',nm:'チェックリスト',icon:'✅',heading:'準備チェックリスト',align:'left',els:[{key:'checklist',value:'アカウント作成した\nプロフィール設定した\nアイコン用意した\n最初の投稿を下書きした'}]},
{id:21,cat:'solution',nm:'テンプレート',icon:'📝',label:'テンプレート',heading:'投稿テンプレート',align:'left',els:[{key:'colored_body',value:'【タイトル】○○で悩んでいませんか？\n\n実は、△△するだけで解決できます。\n\n詳しくはプロフのリンクから👆'},{key:'small',value:'※○○と△△を置き換えて使ってください'}]},

/* ============ STATE ============ */
let secs=[];let uid=0;let aTab=0;
const G={maxW:700,gap:40,radius:20};

/* ============ DRAG STATE ============ */
let dragSecId=null,dragElIdx=null;

/* ============ TABS ============ */
function swTab(n){aTab=n;document.querySelectorAll('.pL-tab').forEach((t,i)=>t.classList.toggle('on',i===n));renderTab();}
function renderTab(){const c=document.getElementById('tabC');[renderGallery,renderEditor,renderSettings][aTab](c);}

/* ============ GALLERY ============ */
function renderGallery(c){
  const cats=CATS.map(cat=>`<div class="cat-btn ${curCat===cat.id?'on':''}" onclick="curCat='${cat.id}';renderTab()">${cat.nm}</div>`).join('');
  const list=T.filter(t=>t.cat===curCat).map(t=>`
    <div class="tpl-item" id="tpl${t.id}">
      <div class="tpl-head">
        <div class="tpl-info"><span style="font-size:16px">${t.icon||'📄'}</span><div><h4>${t.nm}</h4></div></div>
        <div class="tpl-actions">
          <button class="tpl-btn tpl-pv-btn" onclick="event.stopPropagation();document.getElementById('tpl${t.id}').classList.toggle('open')">▼</button>
          <button class="tpl-btn tpl-add-btn" onclick="event.stopPropagation();useTpl(${t.id})">＋追加</button>
        </div>
      </div>
      <div class="tpl-pv"><div id="gp${t.id}" style="pointer-events:none"></div></div>
    </div>`).join('');
  c.innerHTML=`<div class="cat-nav">${cats}</div><div class="tpl-list">${list}</div>`;
  T.filter(t=>t.cat===curCat).forEach(t=>{const el=document.getElementById('gp'+t.id);if(el)el.innerHTML=renderCard(t,cT,true);});
}

function useTpl(id){
  const t=T.find(x=>x.id===id);
  secs.push({id:uid++,icon:t.icon||'',label:t.label||'',heading:t.heading||'',align:t.align||'left',els:JSON.parse(JSON.stringify(t.els))});
  swTab(1);renderPv();
}

/* ============ EDITOR ============ */
function renderEditor(c){
  let h=`<div class="ed-wrap"><div class="ed-top"><button class="btn-ghost" onclick="swTab(0)">← テンプレ追加</button><span style="font-size:10px;color:#aaa">${secs.length}セクション</span></div>`;
  if(!secs.length)h+='<div class="empty-pv" style="padding:20px">テンプレタブからカードを追加</div>';
  else h+=secs.map((s,si)=>{
    const title=s.label||s.heading||`セクション ${si+1}`;
    const elsH=s.els.map((el,ei)=>renderElEd(s.id,el,ei)).join('');
    const addBtns=ELK.map(k=>`<button class="add-b" onclick="addEl(${s.id},'${k.key}')">+ ${k.lb}</button>`).join('');
    return`
    <div class="sec-card" id="sec-${s.id}">
      <div class="sec-card-hd" onclick="togS(${s.id})">
        <h3><span class="num">${si+1}</span>${s.icon||''} ${esc(title)}</h3><span class="arr">▶</span>
      </div>
      <div class="sec-card-bd">
        <div class="rw">
          <div><label>アイコン</label><input type=text value="${esc(s.icon)}" oninput="uf(${s.id},'icon',this.value)" placeholder="🎯"></div>
          <div><label>ラベル</label><input type=text value="${esc(s.label)}" oninput="uf(${s.id},'label',this.value)" placeholder="STEP 1"></div>
        </div>
        <label>見出し</label><input type=text value="${esc(s.heading)}" oninput="uf(${s.id},'heading',this.value)">
        <label>カード配置</label>
        <div class="al-bar">${['left','center','right'].map(a=>`<div class="al-btn ${s.align===a?'on':''}" onclick="uf(${s.id},'align','${a}');renderTab()">{{${a==='left'?'←左':a==='center'?'中央':'右→'}}}</div>`).join('')}</div>
        <label style="margin-top:8px">構成要素 <span style="color:#ccc;font-weight:400">（ドラッグで並び替え）</span></label>
        ${elsH}
        <div class="add-bar">${addBtns}</div>
        <div style="display:flex;justify-content:space-between;margin-top:8px">
          <div><button class="btn-xs" onclick="mvS(${s.id},-1)">↑</button> <button class="btn-xs" onclick="mvS(${s.id},1)">↓</button> <button class="btn-xs" onclick="dupS(${s.id})">複製</button></div>
          <button class="btn-del" onclick="rmS(${s.id})">削除</button>
        </div>
      </div>
    </div>`;
  }).join('');
  h+='</div>';
  c.innerHTML=h.replace(/\{\{←左\}\}/g,'← 左').replace(/\{\{中央\}\}/g,'中央').replace(/\{\{右→\}\}/g,'右 →');
}

function renderElEd(sid,el,ei){
  const defLb=ELK.find(k=>k.key===el.key)?.lb||el.key;
  const displayLabel=el.label||defLb;
  const alBar=`<div class="el-al"><div class="al-bar">${['left','center','right'].map(a=>`<div class="al-btn ${(el.align||'inherit')===a?'on':''}" onclick="uel(${sid},${ei},'align','${a}');renderTab();renderPv()">${a==='left'?'←':a==='center'?'◆':'→'}</div>`).join('')}<div class="al-btn ${!el.align||el.align==='inherit'?'on':''}" onclick="uel(${sid},${ei},'align','inherit');renderTab();renderPv()">継承</div></div></div>`;

  const grip=`<span class="eli-grip" draggable="true" ondragstart="dStart(event,${sid},${ei})" ondragend="dEnd(event)">⠿</span>`;
  const labelInput=`<input class="eli-label-edit" value="${esc(displayLabel)}" oninput="uel(${sid},${ei},'label',this.value);this.style.width=Math.max(40,this.value.length*10)+'px'" style="width:${Math.max(40,displayLabel.length*10)}px" title="クリックで名前変更">`;
  const top=`<div class="eli-top"><div class="eli-top-left">${grip}${labelInput}</div><div class="eli-btns">${alBar}<button class="eli-x" onclick="rmEl(${sid},${ei})">×</button></div></div>`;
  const dropAttrs=`ondragover="dOver(event,${sid},${ei})" ondragleave="dLeave(event)" ondrop="dDrop(event,${sid},${ei})"`;

  if(el.key==='divider')return`<div class="eli" ${dropAttrs}>${top}</div>`;

  if(el.key==='image'||el.key==='image_circle')return`<div class="eli" ${dropAttrs}>${top}
    <div class="img-drop">📷 クリックで画像追加<input type="file" accept="image/*" onchange="hImg(${sid},${ei},this)"></div>
    <div class="img-url-row"><input type=url value="${esc(el.value||'')}" oninput="uel(${sid},${ei},'value',this.value)" placeholder="または画像URLを貼り付け"><button class="btn-xs" onclick="showImgHelp(this)">？</button></div>
    ${el.value?`<img class="img-thumb" src="${el.value}">`:''}
    <div class="help-box" style="display:none"><h4>📷 画像の推奨方法</h4>
    <b>方法1：外部サービスでURLを取得</b><br>
    <a href="https://imgur.com" target="_blank">Imgur</a> / <a href="https://imgbb.com" target="_blank">ImgBB</a> / <a href="https://postimages.org" target="_blank">PostImages</a> に画像をアップロードして、取得した短いURLを上の欄に貼り付けてください。<br><br>
    <b>方法2：直接アップロード</b><br>上の「クリックで画像追加」から選択。ただしファイルサイズが大きいとエクスポート時にHTMLが重くなります。500KB以下推奨。</div></div>`;

  if(el.key==='compare'||el.key==='do_dont'){
    const lb1=el.key==='do_dont'?(el.labelDo||'Do'):(el.labelBefore||'BEFORE');
    const lb2=el.key==='do_dont'?(el.labelDont||"Don't"):(el.labelAfter||'AFTER');
    return`<div class="eli" ${dropAttrs}>${top}
    <div class="rw"><div><label><input class="eli-label-edit" value="${esc(lb1)}" oninput="uel(${sid},${ei},${el.key==='do_dont'?"'labelDo'":"'labelBefore'"},this.value)" style="width:60px"></label><textarea rows=2 oninput="uel(${sid},${ei},${el.key==='do_dont'?"'valueDo'":"'valueBefore'"},this.value)">${esc(el.valueDo||el.valueBefore||'')}</textarea></div>
    <div><label><input class="eli-label-edit" value="${esc(lb2)}" oninput="uel(${sid},${ei},${el.key==='do_dont'?"'labelDont'":"'labelAfter'"},this.value)" style="width:60px"></label><textarea rows=2 oninput="uel(${sid},${ei},${el.key==='do_dont'?"'valueAfter'":"'valueAfter'"},this.value)">${esc(el.valueDont||el.valueAfter||'')}</textarea></div></div></div>`;
  }

  if(el.key==='qa'){
    const items=Array.isArray(el.value)?el.value:[{q:'',a:''}];
    let qaH=items.map((item,qi)=>`<div style="background:#f9f9f9;border-radius:6px;padding:6px;margin-bottom:4px">
      <label>Q${qi+1}</label><input type=text value="${esc(item.q)}" oninput="uqa(${sid},${ei},${qi},'q',this.value)">
      <label>A${qi+1}</label><textarea rows=2 oninput="uqa(${sid},${ei},${qi},'a',this.value)">${esc(item.a)}</textarea>
      <button class="btn-del" style="margin-top:2px" onclick="rmQa(${sid},${ei},${qi})">削除</button></div>`).join('');
    return`<div class="eli" ${dropAttrs}>${top}${qaH}<button class="add-b" onclick="addQa(${sid},${ei})">+ 質問追加</button></div>`;
  }

  if(el.key==='price')return`<div class="eli" ${dropAttrs}>${top}
    <div class="rw"><div><label>通常価格</label><input type=text value="${esc(el.valueOld||'')}" oninput="uel(${sid},${ei},'valueOld',this.value)" placeholder="500,000円"></div>
    <div><label>特別価格</label><input type=text value="${esc(el.valueNew||'')}" oninput="uel(${sid},${ei},'valueNew',this.value)" placeholder="198,000円"></div></div></div>`;

  if(el.key==='cta')return`<div class="eli" ${dropAttrs}>${top}
    <label>ボタン文言</label><input type=text value="${esc(typeof el.value==='string'?el.value:'')}" oninput="uel(${sid},${ei},'value',this.value)" placeholder="LINEで無料相談する">
    <label>リンクURL</label><input type=url value="${esc(el.link||'')}" oninput="uel(${sid},${ei},'link',this.value)" placeholder="https://line.me/..."></div>`;

  const rows=['number','profile_name','profile_title','stars','ribbon','subtitle','title','heading_sub','progress'].includes(el.key)?1:3;
  return`<div class="eli" ${dropAttrs}>${top}<textarea rows=${rows} oninput="uel(${sid},${ei},'value',this.value)">${esc(typeof el.value==='string'?el.value:'')}</textarea></div>`;
}

function showImgHelp(btn){const h=btn.closest('.eli').querySelector('.help-box');h.style.display=h.style.display==='none'?'block':'none';}

/* ============ DRAG & DROP ============ */
function dStart(e,sid,ei){dragSecId=sid;dragElIdx=ei;e.dataTransfer.effectAllowed='move';e.target.closest('.eli').classList.add('dragging');}
function dEnd(e){document.querySelectorAll('.eli').forEach(el=>{el.classList.remove('dragging','drag-over');});dragSecId=null;dragElIdx=null;}
function dOver(e,sid,ei){e.preventDefault();e.dataTransfer.dropEffect='move';if(sid===dragSecId&&ei!==dragElIdx)e.currentTarget.classList.add('drag-over');}
function dLeave(e){e.currentTarget.classList.remove('drag-over');}
function dDrop(e,sid,ei){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(dragSecId!==sid||dragElIdx===ei||dragElIdx===null)return;
  const s=secs.find(x=>x.id===sid);
  const item=s.els.splice(dragElIdx,1)[0];
  s.els.splice(ei>dragElIdx?ei-1:ei,0,item);
  dragSecId=null;dragElIdx=null;
  renderTab();renderPv();
}

/* ============ SETTINGS ============ */

    <label>カード最大幅</label>
    <select onchange="G.maxW=+this.value;document.querySelector('.pv-area').style.maxWidth=this.value+'px'">

      <option value="800" ${G.maxW===800?'selected':''}>800px</option>

      <option value="24" ${G.gap===24?'selected':''}>狭い</option>

      <option value="28" ${G.radius===28?'selected':''}>大</option>

    <div style="margin-top:16px;padding-top:12px;border-top:1px solid #eee">
      <button class="btn-ghost" style="width:100%;margin-bottom:6px" onclick="if(confirm('全削除しますか？')){secs=[];renderTab();renderPv()}">全セクション削除</button>
      <button class="btn-ghost" style="width:100%;margin-bottom:6px" onclick="exportJSON()">データ保存(JSON)</button>

function exportJSON(){const d=JSON.stringify({theme:TH.indexOf(cT),sections:secs,settings:G},null,2);const b=new Blob([d],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='scroll-data.json';a.click();}
function importJSON(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.theme!==undefined)cT=TH[d.theme];if(d.sections)secs=d.sections;if(d.settings)Object.assign(G,d.settings);uid=Math.max(0,...secs.map(s=>s.id))+1;renderThDots();renderTab();renderPv();}catch(e){alert('エラー: '+e.message);}};r.readAsText(f);}

/* ============ EDITOR ACTIONS ============ */
function uf(id,f,v){secs.find(s=>s.id===id)[f]=v;renderPv();}
function uel(id,ei,f,v){secs.find(s=>s.id===id).els[ei][f]=v;renderPv();}
function addEl(id,key){
  const el=key==='compare'?{key,valueBefore:'',valueAfter:''}:key==='do_dont'?{key,valueDo:'',valueDont:''}:key==='qa'?{key,value:[{q:'',a:''}]}:key==='price'?{key,valueOld:'',valueNew:''}:key==='cta'?{key,value:'',link:''}:{key,value:''};
  secs.find(s=>s.id===id).els.push(el);renderTab();renderPv();
}
function rmEl(id,ei){secs.find(s=>s.id===id).els.splice(ei,1);renderTab();renderPv();}
function hImg(sid,ei,inp){
  const f=inp.files[0];if(!f)return;
  // compress if > 500KB
  if(f.size>500*1024){
    const canvas=document.createElement('canvas');const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;const max=1200;
      if(w>max){h=h*(max/w);w=max;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      secs.find(s=>s.id===sid).els[ei].value=canvas.toDataURL('image/jpeg',0.7);
      renderTab();renderPv();
    };
    img.src=URL.createObjectURL(f);
  }else{
    const r=new FileReader();r.onload=e=>{secs.find(s=>s.id===sid).els[ei].value=e.target.result;renderTab();renderPv();};r.readAsDataURL(f);
  }
}
function uqa(sid,ei,qi,field,val){const el=secs.find(s=>s.id===sid).els[ei];if(!Array.isArray(el.value))el.value=[{q:'',a:''}];el.value[qi][field]=val;renderPv();}
function addQa(sid,ei){const el=secs.find(s=>s.id===sid).els[ei];if(!Array.isArray(el.value))el.value=[];el.value.push({q:'',a:''});renderTab();renderPv();}
function rmQa(sid,ei,qi){secs.find(s=>s.id===sid).els[ei].value.splice(qi,1);renderTab();renderPv();}
function togS(id){document.getElementById('sec-'+id)?.classList.toggle('shut');}
function rmS(id){if(!confirm('削除しますか？'))return;secs=secs.filter(s=>s.id!==id);renderTab();renderPv();}
function mvS(id,d){const i=secs.findIndex(s=>s.id===id);const j=i+d;if(j<0||j>=secs.length)return;[secs[i],secs[j]]=[secs[j],secs[i]];renderTab();renderPv();}
function dupS(id){const s=secs.find(x=>x.id===id);const n=JSON.parse(JSON.stringify(s));n.id=uid++;const i=secs.findIndex(x=>x.id===id);secs.splice(i+1,0,n);renderTab();renderPv();}

/* ============ RENDER CARD ============ */
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function clr(v,t){return esc(v).replace(/『([^』]*)』/g,`<span style="color:${t.c};font-weight:700">『$1』</span>`);}

function getAl(el,parent){const a=el.align&&el.align!=='inherit'?el.align:(parent||'left');return`text-align:${a}`;}

function renderCard(s,t,m){
  const pad=m?'14px 16px':'44px 40px';

  if(s.label)h+=`<div style="font-size:${f(12)};font-weight:700;letter-spacing:3px;color:${t.c};margin-bottom:3px;${ast}">${esc(s.label)}</div>`;
  if(s.heading)h+=`<div style="font-size:${f(24)};font-weight:900;color:${t.main};margin-bottom:${m?'6px':'18px'};line-height:1.35;${ast}">${esc(s.heading)}</div>`;

    const v=typeof el.value==='string'?el.value:'';
    const ea=getAl(el,s.align);

    switch(el.key){

      case 'body':h+=`<div style="font-size:${f(15.5)};line-height:2.1;white-space:pre-wrap;color:#444;${ea}">${clr(v,t)}</div>`;break;
      case 'small':h+=`<div style="font-size:${f(12)};color:#999;line-height:1.6;margin-top:10px;white-space:pre-wrap;${ea}">${esc(v)}</div>`;break;
      case 'keypoint':h+=`<div style="margin-top:${m?'6px':'22px'};border-left:4px solid ${t.kpB};padding:${m?'8px 10px':'18px 22px'};background:${t.kpBg};border-radius:0 14px 14px 0"><div style="font-size:${f(10)};font-weight:700;color:${t.kpB};letter-spacing:2px;margin-bottom:${m?'3px':'6px'}">${esc(dlb).toUpperCase()}</div><div style="font-size:${f(14.5)};line-height:2;white-space:pre-wrap;color:#444">${clr(v,t)}</div></div>`;break;

      case 'price':h+=`<div style="${ea};margin:${m?'6px 0':'14px 0'}"><span style="font-size:${f(18)};color:#999;text-decoration:line-through;margin-right:10px">${esc(el.valueOld||'')}</span><span style="font-size:${f(38)};font-weight:900;color:${t.c};font-family:'Inter'">${esc(el.valueNew||'')}</span></div>`;break;
      case 'progress':const pp=v.split('|');h+=`<div style="margin:${m?'3px 0':'8px 0'}"><div style="display:flex;justify-content:space-between;font-size:${f(12)};font-weight:600;margin-bottom:3px"><span>${esc(pp[0]||'')}</span><span style="color:${t.c}">${parseInt(pp[1])||0}%</span></div><div style="height:${m?'5px':'7px'};background:#e5e5e5;border-radius:4px;overflow:hidden"><div style="height:100%;width:${parseInt(pp[1])||0}%;background:${t.grad};border-radius:4px"></div></div></div>`;break;
      case 'ribbon':h+=`<div style="position:absolute;top:14px;right:-28px;background:#ef4444;color:#fff;font-size:${f(10)};font-weight:700;padding:3px 34px;transform:rotate(45deg);letter-spacing:1px;box-shadow:0 2px 6px rgba(0,0,0,.12)">${esc(v)}</div>`;break;
      case 'toc':v.split('\n').filter(Boolean).forEach((l,i)=>{h+=`<div style="display:flex;align-items:center;gap:12px;padding:${m?'3px 0':'10px 0'};border-bottom:1px solid #f5f5f5;font-size:${f(14)}"><span style="color:${t.c};font-weight:900;font-family:'Inter';min-width:20px">${String(i+1).padStart(2,'0')}</span><span style="color:#444">${esc(l)}</span></div>`;});break;
      case 'accordion':v.split('\n').filter(Boolean).forEach(l=>{const[title,...body]=l.split('|');h+=`<div style="border:1px solid #e5e5e5;border-radius:8px;margin-top:${m?'3px':'6px'}"><div style="padding:${m?'6px 10px':'10px 14px'};font-weight:700;font-size:${f(14)};background:#fafafa">${esc(title)}</div><div style="padding:${m?'6px 10px':'10px 14px'};font-size:${f(13)};line-height:1.7;color:#555;border-top:1px solid #f0f0f0">${esc(body.join('|'))}</div></div>`;});break;
      case 'divider':h+=`<hr style="border:none;border-top:1px solid #eee;margin:${m?'8px 0':'22px 0'}">`;break;
    }
  });
  const rd=m?10:G.radius;
  return`<div style="background:#fff;border-radius:${rd}px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.06);padding:${pad};position:relative;overflow:hidden"><div style="position:absolute;top:0;left:0;right:0;height:4px;background:${t.grad}"></div>${h}</div>`;
}

/* ============ PREVIEW ============ */
function renderPv(){
  const c=document.getElementById('pvArea');
  if(!secs.length){c.innerHTML='<div class="empty-pv">← テンプレートからカードを追加してください</div>';return;}
  c.innerHTML=secs.map(s=>`<div style="margin-bottom:${G.gap}px">${renderCard(s,cT,false)}</div>`).join('');
}

/* ============ EXPORT ============ */
function doExport(){
  const blocks=secs.map(s=>renderCard(s,cT,false)).join(`\n<div style="height:${G.gap}px"></div>\n`);
  const html=`<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>スクロール資料</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans JP','Inter',sans-serif;background:${cT.bg};padding:40px 20px}a{color:inherit}</style>
</head><body><div style="max-width:${G.maxW}px;margin:0 auto">${blocks}</div></body></html>`;
  document.getElementById('expArea').value=html;
  document.getElementById('moBg').classList.add('show');
}
function dlFile(){const b=new Blob([document.getElementById('expArea').value],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='scroll-doc.html';a.click();}

/* INIT */
renderTab();
</script>
